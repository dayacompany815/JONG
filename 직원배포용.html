<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>다야냉장팀 작업현황표</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans KR','Apple SD Gothic Neo',sans-serif;background:#0b0f1a;color:#e2eaf5;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;}

.logo{font-size:52px;margin-bottom:12px;}
h1{font-size:26px;font-weight:900;color:#fff;margin-bottom:6px;text-align:center;}
.sub{font-size:13px;color:#5a7a99;margin-bottom:28px;text-align:center;}

.main-btn{
  display:block;
  width:100%;
  max-width:340px;
  background:linear-gradient(135deg,#2ecc71,#16a34a);
  color:#fff;
  text-align:center;
  border-radius:16px;
  padding:20px;
  font-size:20px;
  font-weight:900;
  text-decoration:none;
  box-shadow:0 6px 24px rgba(46,204,113,.35);
  margin-bottom:14px;
  letter-spacing:0.5px;
}
.main-btn:active{opacity:.85;transform:scale(.98);}
.main-url{
  font-size:11px;
  color:#5a7a99;
  text-align:center;
  margin-bottom:36px;
  word-break:break-all;
  max-width:340px;
  line-height:1.6;
}

.qr-box{
  width:100%;
  max-width:340px;
  background:#111827;
  border:1px solid #1e2d45;
  border-radius:14px;
  padding:20px;
  text-align:center;
  margin-bottom:20px;
}
.qr-box .qr-title{font-size:12px;color:#5a7a99;margin-bottom:14px;font-weight:700;letter-spacing:1px;}
#qrcode{display:flex;justify-content:center;}
#qrcode img, #qrcode canvas{border-radius:8px;}

.tip{
  width:100%;
  max-width:340px;
  background:rgba(59,158,255,.07);
  border:1.5px solid rgba(59,158,255,.2);
  border-radius:10px;
  padding:12px 14px;
  font-size:11px;
  color:#3b9eff;
  line-height:1.9;
  text-align:left;
}

.copy-btn{
  display:block;
  width:100%;
  max-width:340px;
  background:rgba(59,158,255,.12);
  color:#3b9eff;
  border:1.5px solid rgba(59,158,255,.3);
  border-radius:10px;
  padding:13px;
  font-size:14px;
  font-weight:700;
  text-align:center;
  cursor:pointer;
  font-family:inherit;
  margin-bottom:14px;
}
.copy-btn:active{opacity:.7;}
</style>
</head>
<body>

<div class="logo">🧊</div>
<h1>다야냉장팀</h1>
<p class="sub">작업현황표 접속 바로가기</p>

<a class="main-btn" href="https://dayacompany815.github.io/JONG/work.html" target="_blank">
  📋 작업현황표 열기
</a>

<div class="main-url">https://dayacompany815.github.io/JONG/work.html</div>

<button class="copy-btn" onclick="copyUrl()">🔗 주소 복사하기</button>

<div class="qr-box">
  <div class="qr-title">📷 QR코드로 바로 접속</div>
  <div id="qrcode"></div>
</div>

<div class="tip">
  💡 <strong>회사 WiFi에서도 접속 가능합니다</strong><br>
  ✅ 인터넷만 되면 어디서든 사용 가능<br>
  ✅ 데이터는 자동 저장·동기화됩니다<br>
  ✅ 즐겨찾기에 추가해두세요
</div>

<!-- QR Code 라이브러리 (CDN) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
const TARGET_URL = 'https://dayacompany815.github.io/JONG/work.html';

// QR 코드 생성
try {
  new QRCode(document.getElementById('qrcode'), {
    text: TARGET_URL,
    width: 200,
    height: 200,
    colorDark: '#ffffff',
    colorLight: '#111827',
    correctLevel: QRCode.CorrectLevel.M
  });
} catch(e) {
  document.getElementById('qrcode').innerHTML = '<p style="color:#5a7a99;font-size:12px;">QR코드를 불러오는 중...</p>';
}

// 주소 복사
function copyUrl() {
  const btn = document.querySelector('.copy-btn');
  navigator.clipboard.writeText(TARGET_URL).then(() => {
    btn.textContent = '✅ 복사 완료!';
    btn.style.color = '#2ecc71';
    btn.style.borderColor = 'rgba(46,204,113,.4)';
    btn.style.background = 'rgba(46,204,113,.1)';
    setTimeout(() => {
      btn.textContent = '🔗 주소 복사하기';
      btn.style.color = '';
      btn.style.borderColor = '';
      btn.style.background = '';
    }, 2000);
  }).catch(() => {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = TARGET_URL;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = '✅ 복사 완료!';
    setTimeout(() => { btn.textContent = '🔗 주소 복사하기'; }, 2000);
  });
}
</script>
</body>
</html>
