            📭 아직 A0 지시수량 데이터가 없습니다.<br>
            <span style="font-size:11px">관리자 모바일 → A0지시 탭에서 날짜별로 입력하면<br>브랜드별 비율이 자동 학습됩니다.</span>
          </div>
        </div>
      </div>`;
  }

  // ── 패턴 분석 (쉬운 언어 인사이트) ──
  const patternInsights = [];

  // 요일 패턴
  if (bestDow && worstDow && bestDow.d !== worstDow.d) {
    const diff = bestDow.avg - worstDow.avg;
    const diffPct = Math.round(diff / (worstDow.avg||1) * 100);
    patternInsights.push({
      icon:'📅',
      title:`${DOW_LABELS[bestDow.d]}요일 = 바쁜 날`,
      desc:`${DOW_LABELS[bestDow.d]}요일(평균 ${bestDow.avg}개)이 ${DOW_LABELS[worstDow.d]}요일(${worstDow.avg}개)보다 ${diffPct}% 더 많습니다. ${DOW_LABELS[bestDow.d]}요일은 인력을 충분히 준비하세요.`,
      color: 'var(--a3)'
    });
  }

  // 금요일 패턴
  if (a.dowCnt[5] >= 4 && a.dowAvg[5] > 0) {
    const friDiff = Math.round((a.dowAvg[5] - a.overall) / a.overall * 100);
    if (friDiff <= -10) {
      patternInsights.push({icon:'😌', title:'금요일은 여유있는 날', desc:`금요일 평균 ${a.dowAvg[5]}개로 평소보다 ${Math.abs(friDiff)}% 적습니다. 금요일 오후는 비교적 여유롭습니다.`, color:'var(--muted)'});
    }
  }

  // 월요일 패턴
  if (a.dowCnt[1] >= 4 && a.dowAvg[1] > 0) {
    const monDiff = Math.round((a.dowAvg[1] - a.overall) / a.overall * 100);
    if (monDiff >= 10) {
      patternInsights.push({icon:'🔥', title:'월요일은 바쁜 날', desc:`월요일 평균 ${a.dowAvg[1]}개로 평소보다 ${monDiff}% 더 많습니다. 주말이 지나면 물량이 몰립니다.`, color:'var(--a6)'});
    }
  }

  // 월초 패턴
  if (earlyPct2 >= 10) {
    patternInsights.push({icon:'📈', title:'월초 첫 3 작업일 물량 급증', desc:`매달 첫 3 작업일은 평소보다 ${earlyPct2}% 더 많습니다. 월초에는 인력과 장비를 미리 준비하세요.`, color:'var(--a6)'});
  } else if (earlyPct2 <= -10) {
    patternInsights.push({icon:'📉', title:'월초 첫 3 작업일 한가함', desc:`매달 첫 3 작업일은 평소보다 ${Math.abs(earlyPct2)}% 더 적습니다.`, color:'var(--muted)'});
  }

  // 주차 패턴
  if (womValid.length >= 3) {
    const womSorted = [...womValid].sort((x,y)=>y.f-x.f);
    const busyWeek = womSorted[0];
    const quietWeek = womSorted[womSorted.length-1];
    if (busyWeek.f > 1.1 && busyWeek.f !== quietWeek.f) {
      patternInsights.push({
        icon:'📆', title:`${busyWeek.label}가 가장 바쁨`,
        desc:`${busyWeek.label}는 평균보다 ${Math.round((busyWeek.f-1)*100)}% 더 많고, ${quietWeek.label}는 ${Math.round((1-quietWeek.f)*100)}% 더 적습니다.`,
        color:'var(--a2)'
      });
    }
  }

  // 명절 전후 패턴
  if (a.holidayPattern && a.holidayPattern.preCnt >= 2 && a.overall > 0) {
    const preDiff = Math.round((a.holidayPattern.preAvg - a.overall) / a.overall * 100);
    if (Math.abs(preDiff) >= 10) {
      patternInsights.push({
        icon: preDiff > 0 ? '🎎' : '😌',
        title: `명절 전 물량 ${preDiff > 0 ? '증가' : '감소'}`,
        desc: `설날·추석 전 1~7일은 평균 ${a.holidayPattern.preAvg}개로 평소보다 ${Math.abs(preDiff)}% ${preDiff > 0 ? '더 많습니다. 인력·재고를 미리 준비하세요.' : '더 적습니다.'}`,
        color: preDiff > 0 ? 'var(--a6)' : 'var(--muted)'
      });
    }
  }
  if (a.holidayPattern && a.holidayPattern.postCnt >= 2 && a.overall > 0) {
    const postDiff = Math.round((a.holidayPattern.postAvg - a.overall) / a.overall * 100);
    if (Math.abs(postDiff) >= 10) {
      patternInsights.push({
        icon: postDiff > 0 ? '🔥' : '🐢',
        title: `명절 후 물량 ${postDiff > 0 ? '급증' : '저조'}`,
        desc: `설날·추석 후 1~7일은 평균 ${a.holidayPattern.postAvg}개로 평소보다 ${Math.abs(postDiff)}% ${postDiff > 0 ? '더 많습니다. 복귀 후 첫 주를 대비하세요.' : '더 적습니다.'}`,
        color: postDiff > 0 ? 'var(--a6)' : 'var(--muted)'
      });
    }
  }

  // 트렌드 패턴
  if (Math.abs(a.trendPct) >= 10) {
    patternInsights.push({
      icon: a.trendPct > 0 ? '📈' : '📉',
      title: a.trendPct > 0 ? '최근 물량 증가 추세' : '최근 물량 감소 추세',
      desc: `최근 2주 평균(${a.r30lastAvg}개)이 그 이전 2주(${a.r30firstAvg}개)보다 ${Math.abs(a.trendPct)}% ${a.trendPct>0?'증가':'감소'}했습니다.`,
      color: a.trendPct > 0 ? 'var(--a3)' : 'var(--red)'
    });
  }

  // 공휴일/휴무 직다음날 패턴
  if (a.nextDayCount >= 2) {
    const ndPct = Math.round((a.nextDayFactor - 1) * 100);
    patternInsights.push({
      icon: '🏖️',
      title: `공휴일·휴무 다음날 물량 ${ndPct >= 5 ? '급증' : ndPct <= -5 ? '감소' : '평소와 비슷'}`,
      desc: `공휴일이나 휴무 후 첫 출근일은 평소보다 ${Math.abs(ndPct)}% ${ndPct >= 0 ? '더 많습니다. 인력을 미리 준비하세요.' : '더 적습니다.'} (${a.nextDayCount}회 실측)`,
      color: ndPct >= 5 ? 'var(--a4)' : 'var(--muted)'
    });
  } else {
    patternInsights.push({
      icon: '🏖️',
      title: '공휴일 다음날 패턴 — 학습 중',
      desc: `아직 데이터가 ${a.nextDayCount||0}건 뿐입니다. 현재는 기본 +20% 가정으로 예측합니다. 공휴일 후 근무일이 쌓이면 실제 패턴으로 자동 업데이트됩니다.`,
      color: 'var(--muted)'
    });
  }

  // 공휴일/휴무 직전날 패턴
  if (a.prevDayCount >= 2) {
    const pdPct = Math.round((a.prevDayFactor - 1) * 100);
    patternInsights.push({
      icon: '📦',
      title: `공휴일·휴무 전날 물량 ${pdPct <= -5 ? '감소' : pdPct >= 5 ? '증가' : '평소와 비슷'}`,
      desc: `택배 미운행으로 공휴일 전날은 평소보다 ${Math.abs(pdPct)}% ${pdPct <= 0 ? '더 적습니다. 예측에 자동 반영됩니다.' : '더 많습니다.'} (${a.prevDayCount}회 실측)`,
      color: pdPct <= -5 ? 'var(--a1)' : 'var(--muted)'
    });
  } else {
    patternInsights.push({
      icon: '📦',
      title: '공휴일 전날 패턴 — 학습 중',
      desc: `아직 데이터가 ${a.prevDayCount||0}건 뿐입니다. 현재는 기본 -20% 가정으로 예측합니다. 데이터가 쌓이면 실제 패턴으로 자동 업데이트됩니다.`,
      color: 'var(--muted)'
    });
  }

  const patternHtml = patternInsights.length > 0 ? `
    <div class="card">
      <div class="chdr"><div class="cdot" style="background:var(--a2)"></div><div class="ctitle">🔍 패턴 분석</div><div class="csub">일하면서 알아두면 좋은 것들</div></div>
      <div class="cbody">
        <div style="font-size:11px;color:var(--muted);margin-bottom:12px;">📌 과거 데이터에서 발견된 규칙들입니다. 참고용으로 활용하세요.</div>
        <div style="display:flex;flex-direction:column;gap:10px;">
          ${patternInsights.map(p=>`
            <div style="background:rgba(255,255,255,.04);border-left:3px solid ${p.color};border-radius:0 10px 10px 0;padding:12px 14px;">
              <div style="font-size:13px;font-weight:800;color:${p.color};margin-bottom:4px;">${p.icon} ${p.title}</div>
              <div style="font-size:12px;color:var(--muted);line-height:1.7;">${p.desc}</div>
            </div>`).join('')}
        </div>
      </div>
    </div>` : '';

  // ── 명절 전후 카드 ──
  let holidayHtml = '';
  if (a.holidayPattern && (a.holidayPattern.preCnt >= 2 || a.holidayPattern.postCnt >= 2)) {
    const overall = a.overall || 1;
    const preRow = a.holidayPattern.preCnt >= 2 ? (() => {
      const d = Math.round((a.holidayPattern.preAvg - overall) / overall * 100);
      const col = d > 0 ? 'var(--a6)' : d < 0 ? 'var(--muted)' : 'var(--a1)';
      return `<div class="sum-card" style="flex:1;background:rgba(255,107,157,.07);border-color:rgba(255,107,157,.25)">
        <div class="sum-label">명절 전 (1~7일)</div>
        <div class="sum-val" style="color:${col}">${a.holidayPattern.preAvg}</div>
        <div style="font-size:10px;color:${col};margin-top:2px;">${d >= 0 ? '+' : ''}${d}% &nbsp;<span style="color:var(--muted)">(${a.holidayPattern.preCnt}일)</span></div>
      </div>`;
    })() : '';
    const postRow = a.holidayPattern.postCnt >= 2 ? (() => {
      const d = Math.round((a.holidayPattern.postAvg - overall) / overall * 100);
      const col = d > 0 ? 'var(--a3)' : d < 0 ? 'var(--muted)' : 'var(--a1)';
      return `<div class="sum-card" style="flex:1;background:rgba(59,158,255,.07);border-color:rgba(59,158,255,.25)">
        <div class="sum-label">명절 후 (1~7일)</div>
        <div class="sum-val" style="color:${col}">${a.holidayPattern.postAvg}</div>
        <div style="font-size:10px;color:${col};margin-top:2px;">${d >= 0 ? '+' : ''}${d}% &nbsp;<span style="color:var(--muted)">(${a.holidayPattern.postCnt}일)</span></div>
      </div>`;
    })() : '';
    holidayHtml = `
    <div class="card">
      <div class="chdr"><div class="cdot" style="background:#ff6b9d"></div><div class="ctitle">🎎 명절 전후 패턴</div><div class="csub">설날·추석 기준</div></div>
      <div class="cbody">
        <div style="font-size:10px;color:var(--muted);margin-bottom:12px;padding:7px 10px;background:rgba(148,163,184,.07);border-radius:8px;line-height:1.7;">
          📌 공휴일 자체는 분석 제외 &nbsp;|&nbsp; 명절 코어 기준 앞뒤 1~7 캘린더일 작업일 대상
        </div>
        <div style="display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap;">
          <div class="sum-card" style="flex:1">
            <div class="sum-label">평일 평균 (기준)</div>
            <div class="sum-val blue">${overall}</div>
          </div>
          ${preRow}${postRow}
        </div>
        <div style="font-size:11px;color:var(--muted);line-height:1.8;">
          💡 데이터가 쌓일수록 명절 패턴 신뢰도가 높아집니다. 현재 ${a.holidayPattern.preCnt + a.holidayPattern.postCnt}일 기준.
        </div>
      </div>
    </div>`;
  }

  // ── 작업자 기여도 분석 카드 ──
  const GRADE_ORDER = ['A','B','C','D'];
  const GRADE_COLOR = {A:'#ffd600', B:'#3b9eff', C:'#2ecc71', D:'#94a3b8'};
  const GRADE_NEXT  = {D:'C', C:'B', B:'A'};

  // ── 위고비 계절성 카드 ──
  let seasonalHtml = '';
  const sa = a.seasonalAnalysis || {};
  if (sa.productName) {
    const hasSeasonal = sa.peakCnt >= 3 || sa.lowCnt >= 3;
    const curMonth = new Date().getMonth() + 1;
    const isPeak = [3,4,5,6,7,8].includes(curMonth);
    const isLow  = [12,1,2].includes(curMonth);
    const nowTag = isPeak ? `<span style="background:#22c55e;color:#000;font-size:10px;font-weight:800;padding:1px 8px;border-radius:8px;margin-left:6px;">📈 현재 성수기</span>`
      : isLow  ? `<span style="background:#94a3b8;color:#000;font-size:10px;font-weight:800;padding:1px 8px;border-radius:8px;margin-left:6px;">📉 현재 비수기</span>`
      : `<span style="background:#ffd600;color:#000;font-size:10px;font-weight:800;padding:1px 8px;border-radius:8px;margin-left:6px;">🔄 중간기</span>`;
    seasonalHtml = `
    <div class="card" style="border-color:rgba(167,139,250,.3);background:rgba(167,139,250,.04);">
      <div class="chdr"><div class="cdot" style="background:var(--a4)"></div><div class="ctitle">💊 ${sa.productName} 계절성 분석</div>${nowTag}</div>
      <div class="cbody">
        <div style="font-size:10px;color:var(--muted);margin-bottom:12px;padding:7px 10px;background:rgba(148,163,184,.07);border-radius:8px;line-height:1.7;">
          🌸 <strong style="color:#2ecc71">성수기(3~8월)</strong>: 다이어트 시즌 수요 집중 &nbsp;|&nbsp; ❄️ <strong style="color:#94a3b8">비수기(12~2월)</strong>: 연말/신년 전후 감소 예상
        </div>
        ${hasSeasonal ? `
        <div class="sum-grid" style="margin-bottom:12px;">
          ${sa.peakCnt >= 3 ? `<div class="sum-card" style="background:rgba(34,197,94,.07);border-color:rgba(34,197,94,.25)">
            <div class="sum-label">🌸 성수기 평균 (${sa.peakCnt}일)</div>
            <div class="sum-val" style="color:#22c55e">${sa.peakAvg}</div>
          </div>` : ''}
          ${sa.lowCnt >= 3 ? `<div class="sum-card" style="background:rgba(148,163,184,.07)">
            <div class="sum-label">❄️ 비수기 평균 (${sa.lowCnt}일)</div>
            <div class="sum-val" style="color:#94a3b8">${sa.lowAvg}</div>
          </div>` : ''}
          ${sa.seasonalFactor > 0 ? `<div class="sum-card">
            <div class="sum-label">계절 배율</div>
            <div class="sum-val" style="color:var(--a5)">${sa.seasonalFactor}x</div>
          </div>` : ''}
        </div>` : `
        <div style="text-align:center;padding:12px;color:var(--muted);font-size:12px;line-height:1.8;">
          📊 데이터 축적 중 · 성수기 3일, 비수기 3일 이상 되면 계절 배율 산출<br>
          <span style="font-size:10px">현재 1월 오픈 기준 — 봄·여름이 지나면 완전한 패턴 확인 가능</span>
        </div>`}
        <div style="font-size:11px;color:var(--muted);line-height:1.8;">
          💡 예측 정확도는 1년 데이터가 쌓이면 계절 보정이 자동 반영됩니다.
        </div>
      </div>
    </div>`;
  }

  // ── 작업자 현황 + 기여도 분석 카드 ──
  let workerHtml = '';
  const workerEntries = Object.entries(a.workerAnalysis || {});
  if (workerEntries.length > 0) {
    const recommendations = [];
    const rows = workerEntries
      .sort((x,y) => GRADE_ORDER.indexOf(x[1].grade) - GRADE_ORDER.indexOf(y[1].grade))
      .map(([name, w]) => {
        const trendStr = w.presentCount >= 3 ? (w.trend > 0 ? `+${w.trend}%↑` : w.trend < 0 ? `${w.trend}%↓` : '—') : '—';
        const trendCol = w.trend >= 10 ? '#22c55e' : w.trend <= -10 ? '#ef4444' : 'var(--muted)';
        const expLabel = w.days !== null ? (w.days >= 60 ? `${Math.floor(w.days/30)}개월` : `${w.days}일`) : '—';
        const expGCell = w.expGrade && w.expGrade !== w.grade
          ? `<span style="font-size:9px;color:${GRADE_COLOR[w.expGrade]||'#94a3b8'};margin-left:3px;">(경력${w.expGrade})</span>` : '';
        // 성과기반 추천
        if (w.trend >= 10 && w.presentCount >= 5 && GRADE_NEXT[w.grade]) {
          recommendations.push({name, current:w.grade, next:GRADE_NEXT[w.grade], trend:w.trend, cnt:w.presentCount, reason:'성과'});
        }
        // 경력기반 추천 (성과데이터 없을 때)
        else if (w.presentCount < 3 && w.expGrade && GRADE_ORDER.indexOf(w.expGrade) < GRADE_ORDER.indexOf(w.grade) && GRADE_NEXT[w.grade]) {
          recommendations.push({name, current:w.grade, next:w.expGrade, trend:null, cnt:0, reason:'경력', expLabel});
        }
        const pAvgCell = w.presentCount >= 2 ? `<td class="num" style="color:var(--a1)">${w.pAvg}</td><td class="num" style="color:${trendCol}">${trendStr}</td>` : `<td class="num" style="color:var(--muted)">축적중</td><td class="num">—</td>`;
        return `<tr>
          <td style="font-weight:800">${name}</td>
          <td style="text-align:center">
            <span style="background:${GRADE_COLOR[w.grade]};color:#000;font-weight:900;padding:1px 7px;border-radius:8px;font-size:11px">${w.grade}</span>${expGCell}
          </td>
          <td class="num" style="color:var(--muted)">${expLabel}</td>
          <td class="num">${w.presentCount}일</td>
          ${pAvgCell}
        </tr>`;
      }).join('');

    const recoHtml = recommendations.length > 0 ? `
      <div style="margin-top:14px;padding:12px 14px;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.3);border-radius:10px;">
        <div style="font-size:12px;font-weight:800;color:#22c55e;margin-bottom:8px;">⬆️ 등급 조정 추천</div>
        ${recommendations.map(r=>`
          <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05);">
            <div><span style="font-weight:800">${r.name}</span>
              <span style="margin:0 6px;font-size:11px;background:rgba(255,255,255,.08);padding:1px 6px;border-radius:6px;">${r.current} → ${r.next}</span>
            </div>
            <div style="font-size:11px;color:#22c55e">
              ${r.reason === '성과' ? `최근 ${r.trend}% 상승 · ${r.cnt}일 출근` : `경력 ${r.expLabel} 기준`}
            </div>
          </div>`).join('')}
        <div style="font-size:10px;color:var(--muted);margin-top:8px;">📌 최종 결정은 관리자가 설정관리에서 변경</div>
      </div>` : '';

    const dataNote = a.workerDataDays >= 3
      ? `작업자 데이터 <strong style="color:var(--a3)">${a.workerDataDays}일</strong> 수집됨`
      : `작업자 출근기록 <strong style="color:var(--a5)">${a.workerDataDays}일</strong> · 3일부터 성과분석 시작`;

    workerHtml = `
    <div class="card">
      <div class="chdr"><div class="cdot" style="background:var(--a4)"></div><div class="ctitle">👷 작업자 현황 & 기여도</div><div class="csub">${dataNote}</div></div>
      <div class="cbody">
        <div style="font-size:10px;color:var(--muted);margin-bottom:12px;padding:7px 10px;background:rgba(148,163,184,.07);border-radius:8px;line-height:1.7;">
          📌 <strong>경력</strong>: 입사일 기준 &nbsp;|&nbsp; <strong>(경력X)</strong>: 경력일수 기준 제안등급 &nbsp;|&nbsp; <strong>평균물량</strong>: 출근일 팀보정 기준<br>
          등급 기준: D=0~60일 / C=61~120일 / B=121~180일 / A=181일+ (성과로 상향 가능)
        </div>
        <table class="detail-table">
          <tr>
            <th>이름</th><th style="text-align:center">등급</th><th style="text-align:right">경력</th>
            <th style="text-align:right">출근</th><th style="text-align:right">평균물량</th><th style="text-align:right">추세</th>
          </tr>
          ${rows}
        </table>
        ${recoHtml}
      </div>
    </div>`;
  }

  // ── 예측 정확도 분석 카드 ──
  let accHtml = '';
  const _pa = a.predAccuracy;
  if (_pa && _pa.log && _pa.log.length >= 3) {
    const _confColor = _pa.confidence >= 85 ? 'var(--a3)' : _pa.confidence >= 70 ? 'var(--a5)' : 'var(--red)';
    const _confBg = _pa.confidence >= 85 ? 'rgba(46,204,113' : _pa.confidence >= 70 ? 'rgba(255,214,0' : 'rgba(239,68,68';
    const _rows = _pa.log.slice().reverse().map(x => {
      const isPos = x.err >= 0;
      const absE = Math.abs(x.err);
      const errCol = absE < 10 ? 'var(--a3)' : absE < 25 ? 'var(--a5)' : 'var(--red)';
      const reasonCol = x.reason==='정상' ? 'var(--muted)' : isPos ? 'var(--a2)' : 'var(--a1)';
      const reasonIcon = x.reason==='정상'?'✅':x.reason==='급증'?'🔥':x.reason==='예상초과'?'📈':x.reason==='급감'?'❄️':'📉';
      return `<tr>
        <td style="color:var(--muted);font-size:12px">${x.key.slice(5)}</td>
        <td style="color:${DOW_COLOR[x.dw]};font-weight:700;font-size:12px">${DOW_KR[x.dw]}</td>
        <td class="num" style="color:var(--muted)">${x.pred}</td>
        <td class="num" style="color:var(--a1);font-weight:800">${x.actual}</td>
        <td class="num" style="color:${errCol};font-weight:800">${isPos?'+':''}${x.err}%</td>
        <td class="num" style="font-size:11px;color:${reasonCol}">${reasonIcon} ${x.reason}</td>
      </tr>`;
    }).join('');
    // 이 분석으로 자동보정 설명
    const autoNote = `분석 실행 시 최근 데이터가 더 높은 가중치(4:3:2:1)로 반영되어 예측이 자동 보정됩니다.`;
    accHtml = `<div class="card" style="border-color:rgba(255,107,157,.3);background:rgba(255,107,157,.03);">
      <div class="chdr"><div class="cdot" style="background:var(--a6)"></div><div class="ctitle">📉 예측 정확도 분석</div><div class="csub">최근 ${_pa.log.length}일 백테스트</div></div>
      <div class="cbody">
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;">
          <div class="sum-card" style="background:${_confBg},.08);border-color:${_confBg},.35);">
            <div class="sum-label">예측 정확도</div>
            <div class="sum-val" style="color:${_confColor}">${_pa.confidence}%</div>
            <div style="font-size:10px;color:${_confColor};margin-top:4px;">${_pa.confidence>=85?'높음':_pa.confidence>=70?'보통':'개선필요'}</div>
          </div>
          <div class="sum-card">
            <div class="sum-label">평균 오차</div>
            <div class="sum-val orange">±${_pa.avgErr}%</div>
            <div style="font-size:10px;color:var(--muted);margin-top:4px;">${_pa.avgErr<10?'매우정확':_pa.avgErr<20?'양호':'데이터축적필요'}</div>
          </div>
          <div class="sum-card">
            <div class="sum-label">분석일수</div>
            <div class="sum-val blue">${_pa.log.length}일</div>
            <div style="font-size:10px;color:var(--muted);margin-top:4px;">최근 10일 기준</div>
          </div>
        </div>
        <table class="detail-table">
          <tr><th>날짜</th><th>요일</th><th style="text-align:right">예측</th><th style="text-align:right">실제</th><th style="text-align:right">오차</th><th style="text-align:right">판정</th></tr>
          ${_rows}
        </table>
        <div style="margin-top:12px;font-size:11px;color:var(--muted);line-height:1.9;padding:10px 12px;background:rgba(255,255,255,.03);border-radius:8px;">
          <div style="font-weight:800;color:var(--text);margin-bottom:6px;">🔄 예측이 왜 틀리고, 어떻게 자동 보정되나요?</div>
          <div>• <strong style="color:var(--a5)">오차 원인</strong>: 정상(±10%) / 예상초과·미달(10~30%) / 급증·급감(30%+)</div>
          <div>• <strong style="color:var(--a3)">자동 보정</strong>: 분석 실행 시 최근 같은 요일 실적(4:3:2:1 가중치)이 다음 예측에 반영</div>
          <div>• <strong style="color:var(--a1)">정확도 향상</strong>: 데이터가 쌓일수록 패턴 인식이 정확해집니다 (목표: 85%+)</div>
        </div>
      </div>
    </div>`;
  }

  // ── 처리기준 인원 계산 카드 ──
  let capacityHtml = '';
  const _ca = a.capacityAnalysis;
  if (_ca && _ca.ratePerPH > 0) {
    const _tom = a.forecast && a.forecast.length > 0 ? a.forecast[0] : null;
    const _tPred = _tom ? _tom.predicted : a.overall;
    const _tDate = _tom ? _tom.key.slice(5) : '평균';
    const _tDow = _tom ? DOW_KR[_tom.dow] : '';
    const _minN = Math.ceil(_tPred / (_ca.ratePerPH * 8));
    const _nRows = [];
    for (let _n = Math.max(1, _minN - 2); _n <= _minN + 4; _n++) {
      const _wH = _tPred / (_n * _ca.ratePerPH);
      const _cH = _wH + (_wH > 4 ? 1 : 0);
      const _fin = Math.round(9 * 60 + _cH * 60);
      const _fH = Math.floor(_fin / 60), _fM = _fin % 60;
      const _finStr = `${String(_fH).padStart(2,'0')}:${String(_fM).padStart(2,'0')}`;
      const _ok = _fH < 18 || (_fH === 18 && _fM === 0);
      const _isMin = _n === _minN;
      _nRows.push(`<tr style="${_isMin ? 'background:rgba(255,214,0,.08);' : ''}">
        <td style="font-weight:${_isMin?'900':'700'};color:${_isMin?'var(--a5)':'inherit'}">${_n}명${_isMin?' <span style="font-size:10px;color:var(--a5);margin-left:3px;">← 최소</span>':''}</td>
        <td class="num" style="color:var(--muted)">${_wH.toFixed(1)}h</td>
        <td class="num" style="color:${_ok?'var(--a3)':'var(--red)'};font-weight:${_isMin?'900':'700'}">${_finStr}</td>
        <td class="num" style="font-size:14px">${_ok?'✅':'❌'}</td>
      </tr>`);
    }
    capacityHtml = `<div class="card" style="border-color:rgba(255,214,0,.4);background:rgba(255,214,0,.03);">
      <div class="chdr"><div class="cdot" style="background:var(--a5)"></div><div class="ctitle">⏱️ 처리기준 인원 계산</div><div class="csub">09:00~18:00 (점심 1h 제외)</div></div>
      <div class="cbody">
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;">
          <div class="sum-card"><div class="sum-label">1인 시간당 처리량</div><div class="sum-val yellow">${_ca.ratePerPH}<span style="font-size:12px;font-weight:600;color:var(--muted)"> 개/h</span></div></div>
          <div class="sum-card"><div class="sum-label">평균 출근인원</div><div class="sum-val blue">${_ca.avgPresent}<span style="font-size:12px;font-weight:600;color:var(--muted)"> 명</span></div></div>
          <div class="sum-card" style="background:rgba(255,214,0,.1);border-color:rgba(255,214,0,.4);"><div class="sum-label">정시완료 최소인원</div><div class="sum-val yellow">${_minN}<span style="font-size:12px;font-weight:600;color:var(--muted)"> 명</span></div></div>
        </div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:12px;padding:8px 12px;background:rgba(255,214,0,.06);border:1px solid rgba(255,214,0,.2);border-radius:8px;line-height:1.8;">
          📊 기준: ${_tDate}(${_tDow}) 예상 <strong style="color:var(--a5)">${_tPred}개</strong> &nbsp;|&nbsp; 1인 시간당 <strong style="color:var(--a5)">${_ca.ratePerPH}개</strong> &nbsp;|&nbsp; 정시완료: <strong style="color:var(--a3)">18:00 이전</strong>
        </div>
        <table class="detail-table">
          <tr><th>인원</th><th style="text-align:right">순수작업시간</th><th style="text-align:right">완료예상</th><th style="text-align:right">정시완료</th></tr>
          ${_nRows.join('')}
        </table>
        <div style="margin-top:12px;font-size:11px;color:var(--muted);line-height:1.9;padding:10px 12px;background:rgba(255,255,255,.03);border-radius:8px;">
          <div style="font-weight:800;color:var(--text);margin-bottom:6px;">📐 계산 근거</div>
          <div>• <strong style="color:var(--a5)">1인 시간당 처리량</strong> = 평균 일량(${a.overall}개) ÷ 평균출근(${_ca.avgPresent}명) ÷ 유효근무(8h) = <strong style="color:var(--a5)">${_ca.ratePerPH}개/h</strong></div>
          <div>• <strong style="color:var(--a5)">정시완료 최소인원</strong> = 예상물량(${_tPred}개) ÷ (${_ca.ratePerPH}개/h × 8h) = ${(_tPred/(_ca.ratePerPH*8)).toFixed(2)}명 → 올림 = <strong style="color:var(--a5)">${_minN}명</strong></div>
          <div>• <strong>유효근무 8h</strong> = 09:00~18:00에서 점심(12:00~13:00) 1h 제외</div>
          <div>• 실제 출근인원이 최소인원보다 많으면 일찍 완료, 적으면 연장 가능성 있음</div>
        </div>
      </div>
    </div>`;
  }

  document.getElementById('ana-result').innerHTML = insightHtml + summaryHtml + accHtml + capacityHtml + seasonalHtml + workerHtml + patternHtml + holidayHtml + earlyHtml + dowHtml + forecastHtml + instrHtml + domHtml + (monHtml||'');
}

// ── 보고서 인쇄 ──
function printReport() {
  if (!anaCache) { showToast('먼저 분석을 실행해 주세요'); return; }
  const a = anaCache;
  const DK = ['일','월','화','수','목','금','토'];
  const ca = a.capacityAnalysis || {};
  const tom = a.forecast && a.forecast.length > 0 ? a.forecast[0] : null;
  const tPred = tom ? tom.predicted : a.overall;
  const tDate = tom ? tom.key.slice(5) : '평균';
  const tDow  = tom ? DK[tom.dow] : '';
  const jkgRatio = a.jkgAnalysis ? a.jkgAnalysis.ratio : 0.786;
  const minN = (ca.ratePerPH > 0) ? Math.ceil(tPred / (ca.ratePerPH * 8)) : '—';

  function nTable() {
    if (!ca.ratePerPH) return '<p style="color:#888">인원 계산 데이터 부족 (분석 재실행 필요)</p>';
    const rows = [];
    for (let n = Math.max(1, minN-2); n <= minN+4; n++) {
      const wH = tPred / (n * ca.ratePerPH);
      const cH = wH + (wH > 4 ? 1 : 0);
      const fin = Math.round(9*60 + cH*60);
      const fH = Math.floor(fin/60), fM = fin%60;
      const fStr = `${String(fH).padStart(2,'0')}:${String(fM).padStart(2,'0')}`;
      const ok = fH < 18 || (fH === 18 && fM === 0);
      const isMin = n === minN;
      rows.push(`<tr style="background:${isMin?'#fffde7':'#fff'}">
        <td style="font-weight:${isMin?'900':'700'};color:${isMin?'#a16207':'#333'}">${n}명${isMin?' ← 정시완료 최소':''}</td>
        <td style="text-align:right;color:#555">${wH.toFixed(1)}h</td>
        <td style="text-align:right;font-weight:${isMin?'900':'700'};color:${ok?'#15803d':'#dc2626'}">${fStr}</td>
        <td style="text-align:right">${ok?'✅ 정시':'❌ 연장'}</td>
      </tr>`);
    }
    return `
<div class="info-box" style="margin-bottom:8px;">
  <strong>📐 계산 방식</strong><br>
  ① 1인 시간당 처리량 = 평균일량(${a.overall}개) ÷ 평균출근(${ca.avgPresent}명) ÷ 유효근무(8h) = <strong>${ca.ratePerPH}개/h</strong><br>
  ② 정시완료 최소인원 = 예상물량(${tPred}개) ÷ (${ca.ratePerPH}개/h × 8h) = ${(tPred/(ca.ratePerPH*8)).toFixed(2)} → 올림 = <strong>${minN}명</strong><br>
  ③ 유효근무 8h = 09:00~18:00 중 점심(12:00~13:00) 1h 제외 · 완료예상에 점심 자동 포함
</div>
<table><tr><th>인원</th><th style="text-align:right">순수작업시간</th><th style="text-align:right">완료예상시각</th><th style="text-align:right">정시완료</th></tr>${rows.join('')}</table>`;
  }

  function accTable() {
    const pa = a.predAccuracy;
    if (!pa || !pa.log || pa.log.length < 3) return '';
    const confColor = pa.confidence>=85?'#15803d':pa.confidence>=70?'#a16207':'#dc2626';
    const rows = pa.log.slice().reverse().map(x => {
      const absE = Math.abs(x.err);
      const eCol = absE<10?'#15803d':absE<25?'#a16207':'#dc2626';
      return `<tr>
        <td>${x.key.slice(5)}</td><td>${DK[x.dw]}요일</td>
        <td style="text-align:right">${x.pred}</td>
        <td style="text-align:right;font-weight:700">${x.actual}</td>
        <td style="text-align:right;color:${eCol};font-weight:700">${x.err>0?'+':''}${x.err}%</td>
        <td style="text-align:right">${x.reason}</td>
      </tr>`;
    }).join('');
    return `
<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px;">
  <div class="mcard"><div class="mlabel">예측 정확도</div><div class="mval" style="color:${confColor}">${pa.confidence}%</div></div>
  <div class="mcard"><div class="mlabel">평균 오차</div><div class="mval" style="color:#E65100">±${pa.avgErr}%</div></div>
  <div class="mcard"><div class="mlabel">분석일수</div><div class="mval">${pa.log.length}일</div></div>
</div>
<table><tr><th>날짜</th><th>요일</th><th style="text-align:right">예측</th><th style="text-align:right">실제</th><th style="text-align:right">오차</th><th style="text-align:right">판정</th></tr>${rows}</table>
<div class="info-box">
  오차 판정 기준: <strong>정상</strong> ±10% 이내 / <strong>예상초과·미달</strong> 10~30% / <strong>급증·급감</strong> 30% 초과<br>
  자동보정 원리: 분석 재실행 시 최근 같은 요일 실적(4:3:2:1 가중치)이 다음 예측에 자동 반영됨
</div>`;
  }

  function dowTable() {
    return [1,2,3,4,5].filter(d=>a.dowCnt[d]>=2).map(d=>{
      const pct = a.overall>0?Math.round((a.dowAvg[d]-a.overall)/a.overall*100):0;
      const jD  = Math.round(a.dowAvg[d]*jkgRatio);
      return `<tr><td style="font-weight:800">${DK[d]}요일</td><td style="text-align:right">${a.dowAvg[d]}</td>
        <td style="text-align:right;color:${pct>5?'#15803d':pct<-5?'#dc2626':'#555'}">${pct>0?'+':''}${pct}%</td>
        <td style="text-align:right;color:#880E4F;font-weight:700">${jD}</td></tr>`;
    }).join('');
  }

  function fcTable() {
    return (a.forecast||[]).map(f=>{
      const jF = Math.round(f.predicted*jkgRatio);
      const pct= a.overall>0?Math.round((f.predicted-a.overall)/a.overall*100):0;
      return `<tr><td>${f.key.slice(5)}</td><td>${DK[f.dow]}요일</td>
        <td style="text-align:right;font-weight:700">${f.predicted}</td>
        <td style="text-align:right;color:#880E4F;font-weight:800">${jF}</td>
        <td style="text-align:right;color:${pct>0?'#15803d':pct<0?'#dc2626':'#555'}">${pct>0?'+':''}${pct}%</td></tr>`;
    }).join('');
  }

  function workerTable() {
    const we = Object.entries(a.workerAnalysis||{});
    if (!we.length) return '';
    const gc = {A:'#78350f',B:'#1e40af',C:'#14532d',D:'#374151'};
    const gb = {A:'#fef3c7',B:'#dbeafe',C:'#dcfce7',D:'#f3f4f6'};
    const rows = we
      .sort((x,y)=>['A','B','C','D'].indexOf(x[1].grade)-['A','B','C','D'].indexOf(y[1].grade))
      .map(([nm,w])=>{
        const eL = w.days!==null?(w.days>=60?`${Math.floor(w.days/30)}개월`:`${w.days}일`):'—';
        const eG = w.expGrade&&w.expGrade!==w.grade?` (경력기준:${w.expGrade})`:'';
        return `<tr>
          <td style="font-weight:800">${nm}</td>
          <td><span style="display:inline-block;padding:1px 8px;border-radius:10px;font-weight:800;font-size:9pt;background:${gb[w.grade]};color:${gc[w.grade]}">${w.grade}</span>${eG}</td>
          <td style="text-align:right">${eL}</td>
          <td style="text-align:right">${w.presentCount}일</td>
          <td style="text-align:right">${w.presentCount>=2?w.pAvg+'개':'—'}</td>
        </tr>`;
      }).join('');
    return `<h2>4. 작업자 현황</h2><table>
      <tr><th>이름</th><th>등급</th><th style="text-align:right">경력</th><th style="text-align:right">출근</th><th style="text-align:right">평균물량</th></tr>
      ${rows}</table>`;
  }

  const today = todayKey();
  const html = `<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8">
<title>다야냉장팀 보고서 ${today}</title>
<style>

.jkg-val{font-size:26pt;font-weight:900;color:#880E4F;line-height:1;}
.info-box{background:#f5f5f5;border:1px solid #ddd;border-radius:6px;padding:8px 12px;font-size:10pt;color:#555;line-height:1.9;margin-bottom:12px;}
.method-box{background:#E3F2FD;border-left:4px solid #1565C0;padding:10px 14px;font-size:10pt;color:#111;line-height:1.9;margin-bottom:10px;}
table{width:100%;border-collapse:collapse;margin-bottom:14px;}
th{font-size:10pt;color:#555;font-weight:700;padding:6px 10px;text-align:left;border-bottom:2px solid #333;}
td{font-size:11pt;padding:7px 10px;border-bottom:1px solid #ddd;}
.footer{margin-top:24px;padding-top:10px;border-top:1px solid #ccc;font-size:9pt;color:#888;text-align:center;}
.print-btn{position:fixed;top:20px;right:20px;background:#1565C0;color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:12pt;font-weight:800;cursor:pointer;z-index:100;}
@media print{.print-btn{display:none;}@page{margin:1.5cm;}body{padding:0;}}
</style></head>
<body>
<button class="print-btn" onclick="window.print()">🖨️ 인쇄</button>
<h1>📊 다야냉장팀 작업 현황 보고서</h1>
<div class="subtitle">보고일: ${today} &nbsp;|&nbsp; 분석기간: ${a.totalDays}일 작업일 기준 &nbsp;|&nbsp; 최고기록: ${a.maxQty}개 (${a.maxDay})</div>

<h2>1. 핵심 지표</h2>
<div class="grid-4">
  <div class="mcard" style="border-color:#880E4F;"><div class="mlabel">종근당 매핑 평균</div><div class="mval" style="color:#880E4F;">${Math.round(a.jkgAnalysis?.overall||0)}</div><div class="msub">비중 ${Math.round(jkgRatio*100)}%</div></div>
  <div class="mcard" style="border-color:#1565C0;"><div class="mlabel">전체 평균 (일)</div><div class="mval" style="color:#1565C0;">${a.overall}</div><div class="msub">${a.totalDays}일 기준</div></div>
  <div class="mcard" style="border-color:#15803d;"><div class="mlabel">최고 기록</div><div class="mval" style="color:#15803d;">${a.maxQty}</div><div class="msub">${a.maxDay}</div></div>
  <div class="mcard" style="border-color:${a.trendPct>0?'#15803d':a.trendPct<0?'#dc2626':'#555'};"><div class="mlabel">최근 트렌드</div><div class="mval" style="color:${a.trendPct>0?'#15803d':a.trendPct<0?'#dc2626':'#555'}">${a.trendPct>0?'+':''}${a.trendPct}%</div><div class="msub">${a.r30firstAvg}→${a.r30lastAvg}</div></div>
</div>

<h2>2. 내일 작업 예측 (${tDate} ${tDow}요일)</h2>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;">
  <div class="jkg-box"><div style="font-size:10pt;color:#880E4F;font-weight:700;margin-bottom:4px;">💊 종근당 매핑 예상</div><div class="jkg-val">${Math.round(tPred*jkgRatio)}</div><div style="font-size:10pt;color:#555;margin-top:4px;">전체 예상 ${tPred}개 · 비중 ${Math.round(jkgRatio*100)}%</div></div>
  <div class="mcard" style="border-color:#a16207;text-align:left;padding:14px 16px;"><div class="mlabel" style="text-align:left">⏱️ 정시완료 최소인원 (18:00 기준)</div><div class="mval" style="color:#a16207;font-size:28pt">${minN}명</div><div class="msub" style="text-align:left">1인 시간당 ${ca.ratePerPH}개 · 평균출근 ${ca.avgPresent}명</div></div>
</div>

<table>
  <tr><th>날짜</th><th>요일</th><th style="text-align:right">예상수량</th><th style="text-align:right">종근당예상</th><th style="text-align:right">평균대비</th></tr>
  ${fcTable()}
</table>

<h2>3. 처리기준 인원 계산</h2>
${nTable()}

${accTable() ? `<h2>${Object.keys(a.workerAnalysis||{}).length>0?5:4}. 예측 정확도 분석</h2>${accTable()}` : ''}

${workerTable()}

<h2>${Object.keys(a.workerAnalysis||{}).length>0?6:5}. 요일별 패턴</h2>
<table>
  <tr><th>요일</th><th style="text-align:right">평균수량</th><th style="text-align:right">평균대비</th><th style="text-align:right">종근당예상</th></tr>
  ${dowTable()}
</table>

<h2>${Object.keys(a.workerAnalysis||{}).length>0?7:6}. 분석 기준 및 방법론</h2>
<div class="method-box">
  <strong>📊 데이터 기준</strong><br>
  • 전체 데이터: ${a.totalDaysAll}일 중 실작업 ${a.totalDays}일 (주말·공휴일·휴무 제외)<br>
  • 분석기간: ${a.totalDays >= 5 ? '충분' : '데이터 부족 (30일+ 권장)'} · 분석일 기준: ${today}
</div>
<div class="method-box">
  <strong>🔮 예측 방법</strong><br>
  • 베이스 예측: 최근 4주 같은 요일 가중평균 (4:3:2:1 → 최근일수록 높은 가중치)<br>
  • 보정 계수: 월별 패턴 × 날짜 패턴 × 트렌드 × 정확도 백테스트 = 최종 예측<br>
  • 자동보정: 분석 재실행 시 최신 실적 반영 → 예측 정확도 점진적 향상
</div>
<div class="method-box">
  <strong>⏱️ 처리기준 인원 계산법</strong><br>
  • 1인 시간당 처리량 = 평균 일량 ÷ 평균 출근인원 ÷ 유효근무시간(8h)<br>
  • 정시완료 최소인원 = 예상물량 ÷ (1인 시간당 처리량 × 8h), 소수점 올림<br>
  • 유효근무 8h = 09:00~18:00 중 점심(12:00~13:00) 1h 제외
</div>
<div class="method-box">
  <strong>💊 종근당 예측 기준</strong><br>
  • 종근당 전용 엔진: 종근당 매핑 실적만 별도 학습 (전체와 독립 예측)<br>
  • 종근당 비중: ${Math.round(jkgRatio*100)}% (실적 기반 자동 산출, 고정값 아님)<br>
  • 데이터가 없을 때: 전체 예측 × 비중으로 추정
</div>
<div class="method-box">
  <strong>👷 작업자 등급 기준</strong><br>
  • D등급: 입사 0~60일 / C등급: 61~120일 / B등급: 121~180일 / A등급: 181일+<br>
  • 등급별 생산성 계수: A=100% / B=85% / C=70% / D=55% (설정관리에서 조정 가능)<br>
  • 실적 데이터 3일+ 쌓이면 성과 기반 등급 조정 권고 자동 표시
</div>

<div class="footer">다야냉장팀 &nbsp;|&nbsp; 작성: ${today} &nbsp;|&nbsp; 데이터 ${a.totalDays}일 기준 자동 생성 보고서 &nbsp;|&nbsp; 이 보고서는 시스템이 자동 분석한 결과입니다</div>
</body></html>`;

  const w = window.open('', '_blank', 'width=960,height=800');
  if (w) { w.document.write(html); w.document.close(); }
  else showToast('팝업 차단을 해제해 주세요');
}

// 초기 로드
document.getElementById('day-pick').value = todayKey();
loadDay();
</script>
</body>
</html>
