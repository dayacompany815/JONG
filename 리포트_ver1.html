<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>다야냉장팀 리포트</title>
<style>
:root {
  --bg:#0b0f1a; --card:#111827; --card2:#1a2235; --border:#1e2d45;
  --text:#e2eaf5; --muted:#5a7a99;
  --a1:#3b9eff; --a2:#f97316; --a3:#2ecc71; --a4:#a78bfa; --a5:#ffd600; --a6:#ff6b9d;
  --red:#ef4444;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR','Segoe UI',sans-serif;min-height:100vh;}

.hdr{position:sticky;top:0;z-index:100;background:linear-gradient(135deg,#080d1a,#0f1e35);border-bottom:2px solid var(--a4);padding:10px 16px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 12px rgba(0,0,0,.5);}
.hdr-icon{font-size:24px;}
.hdr-title{font-size:17px;font-weight:900;color:#fff;flex:1;}
.hdr-sub{font-size:10px;color:var(--muted);}
.hdr-back{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;text-decoration:none;}
.test-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.5);border-radius:6px;padding:2px 7px;font-size:10px;font-weight:700;cursor:pointer;font-family:inherit;}
.test-btn.active{background:rgba(255,214,0,.2);border-color:#ffd600;color:#ffd600;}
.test-mode-bar{position:fixed;top:0;left:50%;transform:translateX(-50%);max-width:480px;width:100%;z-index:9999;background:#ffd600;color:#1a2634;text-align:center;font-size:12px;font-weight:900;padding:4px 8px;pointer-events:none;display:none;}
.test-mode-bar.show{display:block;}

.tab-nav{display:flex;background:#080f18;border-bottom:2px solid var(--border);position:sticky;top:56px;z-index:90;}
.tab-btn{flex:1;border:none;background:transparent;cursor:pointer;font-family:inherit;padding:11px 8px;font-size:13px;font-weight:700;color:var(--muted);border-bottom:3px solid transparent;transition:all .2s;}
.tab-btn.active{color:var(--text);border-bottom-color:var(--a4);}

.main{padding:12px;max-width:900px;margin:0 auto;display:flex;flex-direction:column;gap:12px;padding-bottom:40px;}
.tab-page{display:none;flex-direction:column;gap:12px;}
.tab-page.active{display:flex;}

/* 카드 */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
.chdr{padding:11px 14px;background:var(--card2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.cdot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.ctitle{font-size:14px;font-weight:800;}
.csub{font-size:11px;color:var(--muted);margin-left:auto;}
.cbody{padding:14px;}

/* 날짜 선택 */
.date-picker{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.dpick{background:var(--card2);border:1.5px solid var(--border);border-radius:9px;color:var(--text);font-size:13px;font-weight:600;padding:8px 12px;outline:none;font-family:inherit;cursor:pointer;}
.dpick:focus{border-color:var(--a1);}
.btn-load{background:rgba(59,158,255,.15);border:1.5px solid rgba(59,158,255,.4);color:var(--a1);border-radius:9px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-load:hover{background:rgba(59,158,255,.25);}

/* 요약 그리드 */
.sum-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;}
.sum-card{background:var(--card2);border-radius:10px;padding:12px 10px;text-align:center;border:1px solid var(--border);}
.sum-label{font-size:10px;color:var(--muted);font-weight:600;margin-bottom:5px;}
.sum-val{font-size:26px;font-weight:900;letter-spacing:-1px;line-height:1;}
.sum-val.blue{color:var(--a1);}
.sum-val.pink{color:var(--a6);}
.sum-val.green{color:var(--a3);}
.sum-val.orange{color:var(--a2);}
.sum-val.purple{color:var(--a4);}
.sum-val.yellow{color:var(--a5);}

/* 상세 테이블 */
.detail-table{width:100%;border-collapse:collapse;}
.detail-table th{font-size:11px;color:var(--muted);font-weight:700;padding:6px 10px;text-align:left;border-bottom:1px solid var(--border);}
.detail-table td{font-size:13px;font-weight:600;padding:8px 10px;border-bottom:1px solid rgba(30,45,69,.5);}
.detail-table tr:last-child td{border-bottom:none;}
.detail-table td.num{text-align:right;font-weight:800;color:var(--a1);}
.detail-table td.num.pink{color:var(--a6);}

/* 바 차트 */
.chart-wrap{display:flex;flex-direction:column;gap:6px;}
.chart-row{display:flex;align-items:center;gap:8px;}
.chart-label{font-size:11px;color:var(--muted);font-weight:700;width:70px;flex-shrink:0;text-align:right;}
.chart-bar-bg{flex:1;background:rgba(255,255,255,.06);border-radius:4px;height:20px;overflow:hidden;position:relative;}
.chart-bar{height:100%;border-radius:4px;transition:width .4s ease;min-width:2px;}
.chart-val{font-size:11px;font-weight:800;width:50px;flex-shrink:0;text-align:right;}

/* 주간/월간 날짜 행 */
.day-row{background:var(--card2);border-radius:9px;padding:10px 12px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .15s;border:1px solid transparent;}
.day-row:hover{background:#1e2d45;border-color:var(--border);}
.day-date{font-size:12px;font-weight:800;color:var(--muted);width:80px;flex-shrink:0;}
.day-date.today{color:var(--a5);}
.day-bar-wrap{flex:1;}
.day-total{font-size:16px;font-weight:900;color:var(--a1);flex-shrink:0;width:50px;text-align:right;}
.day-plt{font-size:11px;font-weight:700;color:var(--a4);flex-shrink:0;width:40px;text-align:right;}
.no-data{text-align:center;color:var(--muted);font-size:13px;padding:24px;}

/* 월간 달력 뷰 */
.month-select{display:flex;align-items:center;gap:8px;}
.msel{background:var(--card2);border:1.5px solid var(--border);border-radius:9px;color:var(--text);font-size:13px;font-weight:600;padding:7px 10px;outline:none;font-family:inherit;}

/* 토스트 */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a2634;color:#e2eaf5;border:1px solid #1e2d45;border-radius:10px;padding:10px 20px;font-size:13px;font-weight:700;z-index:9999;opacity:0;transition:opacity .3s;white-space:nowrap;pointer-events:none;}
#toast.show{opacity:1;}

/* 로딩 */
.loading{text-align:center;padding:30px;color:var(--muted);font-size:13px;}

/* ── 프린트 버튼 ── */
.btn-print{background:rgba(167,139,250,.15);border:1.5px solid rgba(167,139,250,.4);color:var(--a4);border-radius:9px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-print:hover{background:rgba(167,139,250,.25);}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-icon">📊</div>
  <div style="flex:1;">
    <div class="hdr-title">작업 리포트</div>
    <div class="hdr-sub">일일 · 주간 · 월간 현황</div>
  </div>
  <button class="test-btn" id="test-mode-btn" onclick="toggleTestMode()">TEST</button>
  <a class="hdr-back" href="관리자PC_ver15.html?v=20260706-2028">← 대시보드</a>
</div>
<div class="test-mode-bar" id="test-mode-bar">🧪 테스트 모드 — 실제 데이터 보호 중 (저장·Firebase 차단)</div>

<div class="tab-nav">
  <button class="tab-btn active" onclick="goTab(0)">📅 일일</button>
  <button class="tab-btn" onclick="goTab(1)">📆 주간</button>
  <button class="tab-btn" onclick="goTab(2)">🗓️ 월간</button>
  <button class="tab-btn" onclick="goTab(3)">📈 분석·예측</button>
  <button class="tab-btn" onclick="goTab(4)">✏️ 수동입력</button>
</div>

<div class="main">

<!-- 일일 탭 -->
<div class="tab-page active" id="tp0">
  <div class="card">
    <div class="chdr"><div class="cdot" style="background:var(--a1)"></div><div class="ctitle">날짜 선택</div></div>
    <div class="cbody">
      <div class="date-picker">
        <input class="dpick" type="date" id="day-pick">
        <button class="btn-load" onclick="loadDay()">조회</button>
      </div>
    </div>
  </div>
  <div id="day-result"></div>
</div>

<!-- 주간 탭 -->
<div class="tab-page" id="tp1">
  <div class="card">
    <div class="chdr"><div class="cdot" style="background:var(--a3)"></div><div class="ctitle">최근 7일</div><div class="csub" id="week-range"></div></div>
    <div class="cbody" id="week-result"><div class="loading">불러오는 중...</div></div>
  </div>
  <div id="week-detail"></div>
</div>

<!-- 월간 탭 -->
<div class="tab-page" id="tp2">
  <div class="card">
    <div class="chdr"><div class="cdot" style="background:var(--a6)"></div><div class="ctitle">월간 현황</div></div>
    <div class="cbody">
      <div class="month-select">
        <select class="msel" id="month-pick" onchange="loadMonth()"></select>
      </div>
    </div>
  </div>
  <div id="month-result"></div>
</div>

<!-- 분석·예측 탭 -->
<div class="tab-page" id="tp3">
  <div class="card">
    <div class="chdr"><div class="cdot" style="background:var(--a5)"></div><div class="ctitle">데이터 분석·예측</div><div class="csub" id="ana-range"></div></div>
    <div class="cbody" style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
      <button class="btn-load" onclick="runAnalysis()" id="ana-btn">🔍 전체 데이터 분석 시작</button>
      <button class="btn-print" onclick="printReport()">📄 보고서 인쇄</button>
      <span id="ana-loading" style="font-size:11px;color:var(--muted);"></span>
    </div>
  </div>
  <div id="ana-result"></div>
</div>

<!-- 수동 입력 탭 -->
<div class="tab-page" id="tp4">
  <div id="manual-form-wrap"></div>
</div>

</div>
<div id="toast"></div>

<script src="daya-api.js?v=20250519"></script>
<script src="daya-error-log.js?v=20250519"></script>
<script>
// ══ 테스트 모드 ══
const TEST_PWD = '0000';
const _TM = sessionStorage.getItem('daya_test_mode') === '1';
function toggleTestMode() {
  if (_TM) {
    sessionStorage.removeItem('daya_test_mode');
    showToast('✅ 테스트 모드 종료 — 실제 모드로 전환');
    setTimeout(() => location.reload(), 800);
  } else {
    const pwd = prompt('테스트 모드 비밀번호 입력');
    if (pwd === null) return;
    if (pwd !== TEST_PWD) { showToast('❌ 비밀번호 오류'); return; }
    sessionStorage.setItem('daya_test_mode', '1');
    showToast('🧪 테스트 모드 진입');
    setTimeout(() => location.reload(), 800);
  }
}
(function initTestMode() {
  if (!_TM) return;
  document.getElementById('test-mode-btn')?.classList.add('active');
  const bar = document.getElementById('test-mode-bar');
  if (bar) bar.classList.add('show');
  const hdr = document.querySelector('.hdr');
  if (hdr) hdr.style.background = 'linear-gradient(135deg,#7b4f00,#b37000)';
})();

var API = window.API;

// ── 탭 전환 ──
let manualFormBuilt = false;
function goTab(i) {
  document.querySelectorAll('.tab-btn').forEach((b,j) => b.classList.toggle('active', i===j));
  document.querySelectorAll('.tab-page').forEach((p,j) => p.classList.toggle('active', i===j));
  if (i===1) loadWeek();
  if (i===2) loadMonthList();
  if (i===3) autoRunAnalysis();  // ← 분석 탭: 자동 실행
  if (i===4 && !manualFormBuilt) { buildManualForm(); manualFormBuilt = true; }
}

// 자동 분석: 오늘 첫 실행이거나 마지막 분석이 어제면 자동 재실행
function autoRunAnalysis() {
  const today = todayKey();
  const lastRan = localStorage.getItem('ana_last_ran');
  // 이미 오늘 분석했고 캐시도 있으면 스킵
  if (anaCache && lastRan === today) {
    document.getElementById('ana-loading').textContent = `✅ 오늘 분석 완료 (${anaCache.totalDays}일 기준)`;
    return;
  }
  runAnalysis();
}

// runAnalysis 완료 시 오늘 날짜 저장
const _origRunAnalysis = runAnalysis;

// ── 날짜 유틸 ──
function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function pad(n) { return String(n).padStart(2,'0'); }
function fmtDate(key) {
  const [y,m,d] = key.split('-');
  const days = ['일','월','화','수','목','금','토'];
  const dow = new Date(key).getDay();
  return `${m}/${d}(${days[dow]})`;
}

// ── 히스토리 데이터 가져오기 ──
async function fetchDay(dateKey) {
  try {
    const r = await fetch(`${API}/history/${dateKey}.json?t=${Date.now()}`);
    return await r.json();
  } catch { return null; }
}

async function fetchHistoryList() {
  try {
    const r = await fetch(`${API}/history/?t=${Date.now()}`);
    const data = await r.json();
    return Array.isArray(data) ? data : [];
  } catch { return []; }
}

// ── 수량 파싱 ──
// 한진·직배 제외한 실작업 수량 (totalQty 없으면 instrData.종근당.boxes 보완)
function getQty(d) {
  if (!d) return 0;
  const hanjin = d?.기타업체?.한진 || 0;
  const jikbae = d?.종근당?.직배 || 0;
  const tq = (d?.totalQty || 0) - hanjin - jikbae;
  if (tq > 0) return tq;
  // work.html 미사용일 → instrData(A0) 기반 박스수로 보완
  return d?.instrData?.종근당?.boxes || 0;
}
function getPlt(d) { return d?.plt || 0; }
function getJkg(d) {
  const mapped = d?.종근당?.매핑 || 0;
  if (mapped > 0) return mapped;
  return d?.instrData?.종근당?.boxes || 0; // A0 보완
}
function getJb(d) { return d?.종근당?.직배 || 0; }
function getOther(d) {
  const o = d?.기타업체 || {};
  return Object.values(o).reduce((a,v) => a + (v||0), 0);
}

// ── 일일 리포트 ──
document.getElementById('day-pick').value = todayKey();

async function loadDay() {
  const key = document.getElementById('day-pick').value;
  if (!key) return;
  document.getElementById('day-result').innerHTML = '<div class="loading">불러오는 중...</div>';
  const d = await fetchDay(key);
  if (!d) {
    document.getElementById('day-result').innerHTML = '<div class="card"><div class="cbody"><div class="no-data">해당 날짜 데이터 없음</div></div></div>';
    return;
  }
  renderDayReport(key, d);
}

function renderDayReport(key, d) {
  const jkg = getJkg(d), jb = getJb(d), other = getOther(d);
  const dms = (d.종근당?.도매상박스 || 0);
  const yc = (d.종근당?.용차박스 || 0);
  const 추가 = Object.values(d.추가 || {}).reduce((a,v)=>a+(v||0),0);

  const biz = d.기타업체 || {};

  document.getElementById('day-result').innerHTML = `
    <div class="card">
      <div class="chdr">
        <div class="cdot" style="background:var(--a5)"></div>
        <div class="ctitle">${fmtDate(key)} 요약</div>
        <div class="csub">작업자: ${d.worker || '-'}</div>
      </div>
      <div class="cbody">
        <div class="sum-grid">
          <div class="sum-card"><div class="sum-label">총 수량(박스)</div><div class="sum-val blue">${getQty(d)}</div></div>
          <div class="sum-card"><div class="sum-label">파렛트(팔렛)</div><div class="sum-val purple">${d.plt||0}</div></div>
          <div class="sum-card"><div class="sum-label">종근당(박스)</div><div class="sum-val pink">${jkg}</div></div>
          <div class="sum-card"><div class="sum-label">기타업체(박스)</div><div class="sum-val orange">${other}</div></div>
          <div class="sum-card"><div class="sum-label">직배(박스)</div><div class="sum-val green">${jb}</div></div>
          <div class="sum-card"><div class="sum-label">도매/용차(박스)</div><div class="sum-val yellow">${dms+yc}</div></div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="chdr"><div class="cdot" style="background:var(--a6)"></div><div class="ctitle">종근당 상세</div></div>
      <div class="cbody">
        <table class="detail-table">
          <tr><th>항목</th><th style="text-align:right">수량</th></tr>
          <tr><td>매핑</td><td class="num pink">${jkg}</td></tr>
          <tr><td>직배</td><td class="num">${jb}</td></tr>
          <tr><td>도매상</td><td class="num">${d.종근당?.도매상||0} (박스 ${dms})</td></tr>
          <tr><td>용차</td><td class="num">${d.종근당?.용차||0} (박스 ${yc})</td></tr>
        </table>
      </div>
    </div>
    ${(() => {
      const instr = d?.instrData?.종근당?.instr || 0;
      const boxes = d?.instrData?.종근당?.boxes || 0;
      if (!instr && !boxes) return '';
      const ratio = instr > 0 && boxes > 0 ? (instr / boxes).toFixed(1) : '—';
      const pct   = instr > 0 && boxes > 0 ? (boxes / instr * 100).toFixed(1) : '—';
      return `
    <div class="card" style="border-color:rgba(233,30,140,.3);">
      <div class="chdr" style="background:rgba(233,30,140,.08);">
        <div class="cdot" style="background:#e91e8c;"></div>
        <div class="ctitle" style="color:#e91e8c;">💊 위고비 실적</div>
      </div>
      <div class="cbody">
        <div class="sum-grid" style="grid-template-columns:repeat(3,1fr);">
          <div class="sum-card"><div class="sum-label">주문수량(개)</div><div class="sum-val pink">${instr.toLocaleString()}</div></div>
          <div class="sum-card"><div class="sum-label">처리박스(박스)</div><div class="sum-val pink">${boxes.toLocaleString()}</div></div>
          <div class="sum-card"><div class="sum-label">개/박스 비율</div><div class="sum-val orange">${ratio}</div></div>
        </div>
        ${pct !== '—' ? `<div style="font-size:10px;color:var(--muted);text-align:center;margin-top:8px;">수량 ${instr}개 → 박스 ${boxes}개 (${pct}%)</div>` : ''}
      </div>
    </div>`;
    })()}
    ${Object.keys(biz).length ? `
    <div class="card">
      <div class="chdr"><div class="cdot" style="background:var(--a2)"></div><div class="ctitle">기타업체 상세</div></div>
      <div class="cbody">
        ${renderBizChart(biz)}
      </div>
    </div>` : ''}
    ${d.snaps && d.snaps.length >= 2 ? `
    <div class="card">
      <div class="chdr"><div class="cdot" style="background:var(--a3)"></div><div class="ctitle">⏱️ 시간별 작업 진행</div><div class="csub">${d.snaps.length}개 기록</div></div>
      <div class="cbody">
        ${renderSnapsChart(d.snaps, getQty(d))}
      </div>
    </div>` : ''}
    ${d.orderTotal ? `
    <div class="card">
      <div class="chdr"><div class="cdot" style="background:var(--a5)"></div><div class="ctitle">📦 주문량 vs 작업량</div></div>
      <div class="cbody">
        <div style="display:flex;gap:10px;">
          <div class="sum-card" style="flex:1"><div class="sum-label">주문수량(개)</div><div class="sum-val yellow">${d.orderTotal}</div></div>
          <div class="sum-card" style="flex:1"><div class="sum-label">작업량(박스)</div><div class="sum-val blue">${getQty(d)}</div></div>
          <div class="sum-card" style="flex:1"><div class="sum-label">비율</div><div class="sum-val green">${(getQty(d)/d.orderTotal*100).toFixed(0)}%</div></div>
        </div>
      </div>
    </div>` : ''}
    ${d.note ? `
    <div class="card">
      <div class="chdr"><div class="cdot" style="background:var(--muted)"></div><div class="ctitle">특이사항</div></div>
      <div class="cbody" style="font-size:13px;line-height:1.7;">${d.note}</div>
    </div>` : ''}
  `;
}

function renderSnapsChart(snaps, finalQty) {
  if (!snaps || snaps.length < 2) return '';
  const maxQty = Math.max(...snaps.map(s=>s.qty), finalQty||0, 1);
  // 시간대별 속도 계산
  const rows = snaps.map((s, i) => {
    const prev = snaps[i-1];
    const diff = prev ? s.qty - prev.qty : s.qty;
    const pct  = (s.qty / maxQty * 100).toFixed(1);
    const diffStr = diff > 0 ? `+${diff}` : `${diff}`;
    const col = diff > 50 ? 'var(--a6)' : diff > 20 ? 'var(--a2)' : 'var(--a3)';
    return `
      <div class="chart-row">
        <div class="chart-label" style="color:var(--muted);font-size:10px">${s.t}</div>
        <div class="chart-bar-bg">
          <div class="chart-bar" style="width:${pct}%;background:linear-gradient(90deg,var(--a1),var(--a3))"></div>
        </div>
        <div style="width:55px;flex-shrink:0;text-align:right">
          <span style="font-size:13px;font-weight:900;color:var(--a1)">${s.qty}</span>
          <span style="font-size:10px;font-weight:700;color:${col};margin-left:3px">${i>0?diffStr:''}</span>
        </div>
      </div>`;
  });
  // 시간당 평균 속도 계산
  const first = snaps[0], last = snaps[snaps.length-1];
  const [fh,fm] = first.t.split(':').map(Number);
  const [lh,lm] = last.t.split(':').map(Number);
  const elapsedH = ((lh*60+lm) - (fh*60+fm)) / 60;
  const rate = elapsedH > 0 ? Math.round((last.qty - first.qty) / elapsedH) : 0;
  return `
    <div class="chart-wrap">${rows.join('')}</div>
    <div style="margin-top:10px;padding:8px 12px;background:rgba(59,158,255,.07);border-radius:8px;font-size:11px;color:var(--muted);display:flex;gap:14px;">
      <span>⚡ 시간당 평균 <strong style="color:var(--a1)">${rate}개</strong></span>
      <span>📈 총 ${last.qty}개 → ${finalQty > last.qty ? `최종 ${finalQty}개` : '완료'}</span>
    </div>`;
}

function renderBizChart(biz) {
  const items = Object.entries(biz).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
  if (!items.length) return '<div class="no-data">데이터 없음</div>';
  const max = Math.max(...items.map(([,v])=>v), 1);
  const colors = ['#3b9eff','#f97316','#2ecc71','#a78bfa','#ffd600','#ff6b9d','#06b6d4','#84cc16'];
  return `<div class="chart-wrap">${items.map(([name,val],i)=>`
    <div class="chart-row">
      <div class="chart-label">${name}</div>
      <div class="chart-bar-bg">
        <div class="chart-bar" style="width:${(val/max*100).toFixed(1)}%;background:${colors[i%colors.length]}"></div>
      </div>
      <div class="chart-val" style="color:${colors[i%colors.length]}">${val}</div>
    </div>`).join('')}</div>`;
}

async function loadWeek() {

  const today = new Date();
  for (let i=6; i>=0; i--) {
    const d = new Date(today);
    d.setDate(today.getDate() - i);
    dates.push(`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`);
  }

  document.getElementById('week-range').textContent = `${fmtDate(dates[0])} ~ ${fmtDate(dates[6])}`;
  document.getElementById('week-result').innerHTML = '<div class="loading">불러오는 중...</div>';

  const results = await Promise.all(dates.map(k => fetchDay(k)));
  const pairs = dates.map((k,i) => [k, results[i]]);

  const total7 = pairs.reduce((s,[,d])=>s+getQty(d),0);
  const avg7 = Math.round(total7/7);

  document.getElementById('week-result').innerHTML = `

    </div>
    <div class="chart-wrap">
      ${pairs.map(([k,d])=>{

          <div class="chart-bar-bg">

          ${pairs.map(([k,d])=>`
            <tr>
              <td style="${k===todayKey()?'color:var(--a5);font-weight:800':''}">${fmtDate(k)}</td>
              <td class="num">${getQty(d)||'-'}</td>

// ── 월간 리포트 ──
async function loadMonthList() {
  const sel = document.getElementById('month-pick');
  if (sel.options.length > 0) { loadMonth(); return; }

  // 최근 12개월 옵션 생성
  const today = new Date();
  for (let i=0; i<12; i++) {
    const d = new Date(today.getFullYear(), today.getMonth()-i, 1);
    const val = `${d.getFullYear()}-${pad(d.getMonth()+1)}`;
    const opt = document.createElement('option');
    opt.value = val;
    opt.textContent = `${d.getFullYear()}년 ${d.getMonth()+1}월`;
    sel.appendChild(opt);
  }
  loadMonth();
}

async function loadMonth() {
  const ym = document.getElementById('month-pick').value;
  if (!ym) return;
  const [year, month] = ym.split('-').map(Number);

  document.getElementById('month-result').innerHTML = '<div class="card"><div class="cbody"><div class="loading">불러오는 중...</div></div></div>';

  const daysInMonth = new Date(year, month, 0).getDate();
  const dates = Array.from({length:daysInMonth}, (_,i) => `${year}-${pad(month)}-${pad(i+1)}`);
  const results = await Promise.all(dates.map(k => fetchDay(k)));
  const pairs = dates.map((k,i) => [k, results[i]]).filter(([,d])=>d);

  if (!pairs.length) {
    document.getElementById('month-result').innerHTML = '<div class="card"><div class="cbody"><div class="no-data">해당 월 데이터 없음</div></div></div>';
    return;
  }

  const totalM = pairs.reduce((s,[,d])=>s+getQty(d),0);
  const workDays = pairs.length;
  const avgM = Math.round(totalM/workDays);
  const maxM = Math.max(...pairs.map(([,d])=>getQty(d)));

  document.getElementById('month-result').innerHTML = `
    <div class="card">
      <div class="chdr"><div class="cdot" style="background:var(--a6)"></div><div class="ctitle">${year}년 ${month}월 요약</div></div>
      <div class="cbody">
        <div class="sum-grid" style="margin-bottom:16px;">
          <div class="sum-card"><div class="sum-label">월 합계(박스)</div><div class="sum-val blue">${totalM}</div></div>
          <div class="sum-card"><div class="sum-label">작업일수</div><div class="sum-val green">${workDays}일</div></div>
          <div class="sum-card"><div class="sum-label">일 평균(박스)</div><div class="sum-val orange">${avgM}</div></div>
          <div class="sum-card"><div class="sum-label">최고 일량(박스)</div><div class="sum-val yellow">${maxM}</div></div>
          <div class="sum-card"><div class="sum-label">종근당 합계(박스)</div><div class="sum-val pink">${pairs.reduce((s,[,d])=>s+getJkg(d),0)}</div></div>
          <div class="sum-card"><div class="sum-label">파렛트 합계(팔렛)</div><div class="sum-val purple">${pairs.reduce((s,[,d])=>s+getPlt(d),0)}</div></div>
          <div class="sum-card" style="border-color:rgba(233,30,140,.3);"><div class="sum-label">💊 위고비 주문합계(개)</div><div class="sum-val pink">${pairs.reduce((s,[,d])=>s+(d?.instrData?.종근당?.instr||0),0)||'-'}</div></div>
          <div class="sum-card" style="border-color:rgba(233,30,140,.3);"><div class="sum-label">💊 위고비 건수합계</div><div class="sum-val pink">${pairs.reduce((s,[,d])=>s+(d?.instrData?.종근당?.count||0),0)||'-'}</div></div>
          <div class="sum-card" style="border-color:rgba(233,30,140,.3);"><div class="sum-label">💊 위고비 평균박스(일)</div><div class="sum-val orange">${(()=>{const jkgDays=pairs.filter(([,d])=>d?.instrData?.종근당?.boxes>0);return jkgDays.length?Math.round(jkgDays.reduce((s,[,d])=>s+d.instrData.종근당.boxes,0)/jkgDays.length):'-';})()}</div></div>
        </div>
        <div class="chart-wrap">
          ${pairs.map(([k,d])=>{
            const qty = getQty(d);
            const isToday = k===todayKey();
            return `<div class="chart-row">
              <div class="chart-label" style="${isToday?'color:var(--a5)':''}">
                ${pad(parseInt(k.split('-')[2]))}일
              </div>
              <div class="chart-bar-bg">
                <div class="chart-bar" style="width:${maxM>0?(qty/maxM*100).toFixed(1):0}%;background:${isToday?'var(--a5)':'var(--a6)'}"></div>
              </div>
              <div class="chart-val" style="color:${isToday?'var(--a5)':'var(--a6)'}">${qty}</div>
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>
    <div class="card">
      <div class="chdr"><div class="cdot" style="background:var(--a2)"></div><div class="ctitle">업체별 월 합계</div></div>
      <div class="cbody">
        ${renderMonthBiz(pairs)}
      </div>

function renderMonthBiz(pairs) {
  const totals = {};
  pairs.forEach(([,d]) => {
    Object.entries(d?.기타업체 || {}).forEach(([k,v]) => { totals[k] = (totals[k]||0)+(v||0); });
  });
  const items = Object.entries(totals).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
  if (!items.length) return '<div class="no-data">데이터 없음</div>';
  const max = Math.max(...items.map(([,v])=>v),1);
  const colors = ['#3b9eff','#f97316','#2ecc71','#a78bfa','#ffd600','#ff6b9d','#06b6d4','#84cc16'];
  return `<div class="chart-wrap">${items.map(([name,val],i)=>`
    <div class="chart-row">
      <div class="chart-label">${name}</div>
      <div class="chart-bar-bg">
        <div class="chart-bar" style="width:${(val/max*100).toFixed(1)}%;background:${colors[i%colors.length]}"></div>
      </div>
      <div class="chart-val" style="color:${colors[i%colors.length]}">${val}</div>
    </div>`).join('')}</div>`;
}

function calcTotal() {
  // 직배(m-jb) 제외
  const ids = ['m-jkg','m-dms','m-dmsbox','m-yc','m-ycbox','m-gw','m-gs','m-gb'];
  let total = ids.reduce((s,id) => s + (parseInt(document.getElementById(id)?.value)||0), 0);
  // 기타업체 중 한진 제외
  document.querySelectorAll('[data-etc]').forEach(el => {
    if (el.dataset.etc !== '한진') total += parseInt(el.value)||0;
  });
  const el = document.getElementById('m-total-display');
  if (el) el.textContent = total;
}

function v(id) { return parseInt(document.getElementById(id)?.value) || 0; }

  if (_TM) { setMStatus('🧪 테스트 모드 — Firebase 저장 차단', true); return; }
  const dateKey = document.getElementById('m-date')?.value;
  if (!dateKey) { setMStatus('날짜를 선택하세요', true); return; }

  const jkg  = v('m-jkg'), jb = v('m-jb'), dms = v('m-dms'), dmsBox = v('m-dmsbox');
  const yc   = v('m-yc'), ycBox = v('m-ycbox');
  const gw   = v('m-gw'), gs = v('m-gs'), gb = v('m-gb');
  const plt  = v('m-plt');
  const worker = document.getElementById('m-worker')?.value?.trim() || '미입력';
  const note   = document.getElementById('m-note')?.value?.trim() || '';

  // 직배 상세
  const jbDetail = {};
  document.querySelectorAll('[data-jb]').forEach(el => {
    const val = parseInt(el.value) || 0;
    if (val > 0) jbDetail[el.dataset.jb] = val;
  });

  // 기타업체
  const etc = {};
  document.querySelectorAll('[data-etc]').forEach(el => {
    const val = parseInt(el.value) || 0;
    if (val > 0) etc[el.dataset.etc] = val;
  });

  const etcTotal = Object.values(etc).reduce((a,v)=>a+v,0);
  const totalQty = jkg + jb + dms + dmsBox + yc + ycBox + etcTotal + gw + gs + gb;

  const days = ['일','월','화','수','목','금','토'];
  const dow  = days[new Date(dateKey).getDay()];

  const payload = {
    date: `${dateKey}(${dow})`,
    worker,
    totalQty,
    plt,
    종근당: { 매핑:jkg, 직배:jb, 도매상:dms, 도매상박스:dmsBox, 용차:yc, 용차박스:ycBox },
    직배상세: jbDetail,
    기타업체: etc,
    추가: { 광교:gw, 가산연합의원:gs, 개별운송:gb },
    note,
    manualEntry: true,
  };

  setMStatus('저장 중...', false);
  try {
    const res = await fetch(`${API}/history/${dateKey}.json`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const json = await res.json();
    if (json.ok) {
      setMStatus(`✅ ${dateKey} 저장 완료 (전체 ${totalQty}개)`, false);
      showToast('저장 완료!');
    } else {
      setMStatus('저장 실패', true);
    }
  } catch(e) {
    setMStatus('저장 오류: ' + e.message, true);
  }
}

function setMStatus(msg, isErr) {
  const el = document.getElementById('m-status');
  if (el) { el.textContent = msg; el.style.color = isErr ? '#ef4444' : '#2ecc71'; }
}

// ══════════════════════════════════════════════
// 📈 분석·예측 엔진
// ══════════════════════════════════════════════
let anaCache = null; // 분석 결과 캐시

async function runAnalysis() {
  const btn = document.getElementById('ana-btn');
  const loading = document.getElementById('ana-loading');
  btn.disabled = true; btn.textContent = '⏳ 로딩 중...';
  loading.textContent = '히스토리 목록 가져오는 중...';

  try {
    const list = await fetchHistoryList();
    if (!list.length) {
      document.getElementById('ana-result').innerHTML = '<div class="card"><div class="cbody"><div class="no-data">저장된 데이터가 없습니다</div></div></div>';
      return;
    }

    // 날짜 파일명 → YYYY-MM-DD 추출
    const dateKeys = list.map(f => f.replace('.json','')).filter(k=>/^\d{4}-\d{2}-\d{2}$/.test(k)).sort();
    loading.textContent = `총 ${dateKeys.length}일 데이터 불러오는 중...`;

    // 배치로 가져오기 (10개씩)
    const all = [];
    for (let i=0; i<dateKeys.length; i+=10) {
      const batch = dateKeys.slice(i, i+10);
      const results = await Promise.all(batch.map(k => fetchDay(k)));
      batch.forEach((k,j) => { if (results[j]) all.push([k, results[j]]); });
      loading.textContent = `${Math.min(i+10, dateKeys.length)} / ${dateKeys.length}일 로드 중...`;
    }

    if (all.length < 3) {
      document.getElementById('ana-result').innerHTML = '<div class="card"><div class="cbody"><div class="no-data">분석에 필요한 데이터가 부족합니다 (최소 3일)</div></div></div>';
      return;
    }

    document.getElementById('ana-range').textContent = `${all[0][0]} ~ ${all[all.length-1][0]} (${all.length}일)`;
    loading.textContent = '';
    anaCache = computeAnalysis(all);
    renderAnalysis(anaCache);
    // ✅ 오늘 날짜 저장 → 내일 탭 열기 전까지 재실행 안 함
    localStorage.setItem('ana_last_ran', todayKey());

  } finally {
    btn.disabled = false; btn.textContent = '🔄 다시 분석';
  }
}

function computeAnalysis(pairs) {
  const DOW_KR = ['일','월','화','수','목','금','토'];

  // ── 공휴일 정의 ──
  const FIXED_HOLIDAYS = new Set(['01-01','03-01','05-01','05-05','06-06','08-15','10-03','10-09','12-25']);
  const LUNAR_HOLIDAYS = new Set([
    // 2023 설날·추석·석가탄신일·대체공휴일
    '2023-01-21','2023-01-22','2023-01-23','2023-01-24',
    '2023-05-27',
    '2023-09-27','2023-09-28','2023-09-29','2023-09-30','2023-10-02',
    // 2024
    '2024-02-08','2024-02-09','2024-02-10','2024-02-11','2024-02-12',
    '2024-05-06','2024-05-15',
    '2024-09-15','2024-09-16','2024-09-17','2024-09-18',
    // 2025
    '2025-01-27','2025-01-28','2025-01-29','2025-01-30','2025-01-31',
    '2025-05-06',
    '2025-10-04','2025-10-05','2025-10-06','2025-10-07','2025-10-08',
    // 2026
    '2026-02-15','2026-02-16','2026-02-17','2026-02-18','2026-02-19',
    '2026-05-24','2026-05-25',
    '2026-09-23','2026-09-24','2026-09-25','2026-09-26','2026-09-28',
    // 2027
    '2027-02-05','2027-02-06','2027-02-07','2027-02-08','2027-02-09',
    '2027-05-13',
    '2027-10-13','2027-10-14','2027-10-15','2027-10-16',
  ]);
  const isHoliday = k => LUNAR_HOLIDAYS.has(k) || FIXED_HOLIDAYS.has(k.slice(5));

  // 명절 코어 날짜 (설날·추석 당일) — 전후 패턴 분석용
  const HOLIDAY_CORES = [
    '2023-01-22','2023-09-29',
    '2024-02-10','2024-09-17',
    '2025-01-29','2025-10-06',
    '2026-02-17','2026-09-25',
    '2027-02-07','2027-10-15',
  ];
  function daysToNearestCore(dateStr) {
    const t = new Date(dateStr).getTime();
    let best = Infinity;
    HOLIDAY_CORES.forEach(c => {
      const d = (t - new Date(c).getTime()) / 864e5;
      if (Math.abs(d) < Math.abs(best)) best = d;
    });
    return best; // 음수=명절 전, 양수=명절 후
  }

  // 주말(토/일) + 공휴일 + 휴무(qty=0) 제외
  const weekdayPairs = pairs.filter(([k]) => { const d = new Date(k).getDay(); return d !== 0 && d !== 6; });
  const nonHolidayPairs = weekdayPairs.filter(([k]) => !isHoliday(k));
  const workPairs = nonHolidayPairs.filter(([, d]) => getQty(d) > 0);
  const holidayExcluded = weekdayPairs.length - nonHolidayPairs.length;
  const offDayExcluded = nonHolidayPairs.length - workPairs.length;
  if (!workPairs.length) workPairs.push(...pairs);

  // ── 명절 전후 패턴 (코어 기준 1~7 캘린더일 이내 작업일) ──
  const preHolidayQtys = [], postHolidayQtys = [];
  workPairs.forEach(([k, d]) => {
    const dist = daysToNearestCore(k);
    if (dist >= -7 && dist <= -1) preHolidayQtys.push(getQty(d));
    else if (dist >= 1 && dist <= 7) postHolidayQtys.push(getQty(d));
  });
  const preHolidayAvg  = preHolidayQtys.length  >= 2 ? Math.round(preHolidayQtys.reduce((a,b)=>a+b,0)/preHolidayQtys.length)  : 0;
  const postHolidayAvg = postHolidayQtys.length >= 2 ? Math.round(postHolidayQtys.reduce((a,b)=>a+b,0)/postHolidayQtys.length) : 0;
  const holidayPattern = { preAvg: preHolidayAvg, postAvg: postHolidayAvg, preCnt: preHolidayQtys.length, postCnt: postHolidayQtys.length };

  // ── 공휴일/휴무 직다음날 계수 (ALL 공휴일 + 데이터없는 평일) ──
  // 데이터 범위 내 평일인데 데이터 없는 날 = 휴무일
  const _dataSet = new Set(pairs.map(([k])=>k));
  const _closedSet = new Set();
  if (pairs.length >= 2) {
    const _sf = new Date(pairs[0][0]), _sl = new Date(pairs[pairs.length-1][0]);
    for (let _dd = new Date(_sf); _dd <= _sl; _dd.setDate(_dd.getDate()+1)) {
      const _dk = _dd.toISOString().slice(0,10);
      const _dw = _dd.getDay();
      if (_dw !== 0 && _dw !== 6 && !_dataSet.has(_dk)) _closedSet.add(_dk);
    }
  }
  function _prevWorkday(ds) {
    const d = new Date(ds);
    for(let i=1;i<=10;i++){d.setDate(d.getDate()-1);const dw=d.getDay();if(dw!==0&&dw!==6)return d.toISOString().slice(0,10);}
    return null;
  }
  function _isClosedDay(ds) { return isHoliday(ds) || _closedSet.has(ds); }
  const _ndQtys=[], _normNdQtys=[];
  workPairs.forEach(([k,d])=>{
    const prev=_prevWorkday(k);
    if(prev && _isClosedDay(prev)) _ndQtys.push(getQty(d));
    else if(prev) _normNdQtys.push(getQty(d));
  });
  const _ndAvg = _ndQtys.length>=2 ? _ndQtys.reduce((a,b)=>a+b,0)/_ndQtys.length : 0;
  const _normNdAvg = _normNdQtys.length>=2 ? _normNdQtys.reduce((a,b)=>a+b,0)/_normNdQtys.length : 0;
  let nextDayFactor;
  if(_ndQtys.length>=2 && _normNdAvg>0){
    const _raw=_ndAvg/_normNdAvg;
    nextDayFactor=parseFloat(Math.min(1.9,Math.max(0.85,0.45+_raw*0.55)).toFixed(3));
  } else {
    nextDayFactor=1.2; // 데이터 부족 시 기본 +20% 가정
  }
  const nextDayCount=_ndQtys.length;

  // ── 공휴일/휴무 직전날 계수 (택배 주문 감소) ──
  function _nextWorkday(ds) {
    const d = new Date(ds);
    for(let i=1;i<=10;i++){d.setDate(d.getDate()+1);const dw=d.getDay();if(dw!==0&&dw!==6)return d.toISOString().slice(0,10);}
    return null;
  }
  const _pdQtys=[], _normPdQtys=[];
  workPairs.forEach(([k,d])=>{
    const next=_nextWorkday(k);
    if(next && _isClosedDay(next)) _pdQtys.push(getQty(d));
    else _normPdQtys.push(getQty(d));
  });
  const _pdAvg = _pdQtys.length>=2 ? _pdQtys.reduce((a,b)=>a+b,0)/_pdQtys.length : 0;
  const _normPdAvg = _normPdQtys.length>=2 ? _normPdQtys.reduce((a,b)=>a+b,0)/_normPdQtys.length : 0;
  let prevDayFactor;
  if(_pdQtys.length>=2 && _normPdAvg>0){
    const _raw=_pdAvg/_normPdAvg;
    prevDayFactor=parseFloat(Math.min(1.0,Math.max(0.5,0.3+_raw*0.7)).toFixed(3));
  } else {
    prevDayFactor=0.8; // 데이터 부족 시 기본 -20% 가정
  }
  const prevDayCount=_pdQtys.length;

  // 기초 통계 (주말 제외)
  const qtys = workPairs.map(([,d]) => getQty(d));
  const overall = qtys.reduce((a,b)=>a+b,0) / qtys.length;

  // ── 이상치 제거 (±2σ) 후 정제 평균 ──
  const _mu = overall;
  const _sigma = Math.sqrt(qtys.map(v=>(v-_mu)**2).reduce((a,b)=>a+b,0)/qtys.length);
  const cleanQtys = qtys.filter(v=>Math.abs(v-_mu)<=2*_sigma);
  const overallClean = Math.round(cleanQtys.length ? cleanQtys.reduce((a,b)=>a+b,0)/cleanQtys.length : overall);

  // ── 종근당 매핑 전용 분석 ──
  const jkgPairs = workPairs.filter(([,d]) => getJkg(d) > 0);
  const jkgQtys = jkgPairs.map(([,d]) => getJkg(d));
  const jkgOverall = jkgQtys.length ? Math.round(jkgQtys.reduce((a,b)=>a+b,0) / jkgQtys.length) : 0;
  // 종근당 요일별 평균
  const jkgDowSum = Array(7).fill(0), jkgDowCnt = Array(7).fill(0);
  jkgPairs.forEach(([k,d]) => { const dw=new Date(k).getDay(); jkgDowSum[dw]+=getJkg(d); jkgDowCnt[dw]++; });
  const jkgDowAvg = jkgDowSum.map((s,i) => jkgDowCnt[i] ? Math.round(s/jkgDowCnt[i]) : 0);
  const jkgDowFactor = jkgDowAvg.map(a => jkgOverall > 0 ? parseFloat((a/jkgOverall).toFixed(3)) : 1);
  // 종근당 최근 4주 가중평균
  const jkgRecent4w = Array(7).fill(0);
  for (let dw=1; dw<=5; dw++) {
    const _sd = jkgPairs.filter(([k])=>new Date(k).getDay()===dw).slice(-4);
    if (_sd.length > 0) {
      const ws=[4,3,2,1].slice(4-_sd.length), tw=ws.reduce((a,b)=>a+b,0);
      jkgRecent4w[dw] = Math.round(_sd.reduce((s,[,d],i)=>s+getJkg(d)*ws[i],0)/tw);
    }
  }
  // 종근당 비율 (총량 대비)
  const jkgRatioPairs = workPairs.filter(([,d]) => getQty(d) > 0 && getJkg(d) > 0);
  const jkgRatio = jkgRatioPairs.length
    ? parseFloat((jkgRatioPairs.reduce((s,[,d])=>s+getJkg(d)/getQty(d),0)/jkgRatioPairs.length).toFixed(3))
    : 0.786;
  const jkgAnalysis = { overall: jkgOverall, dowAvg: jkgDowAvg, dowFactor: jkgDowFactor, recent4w: jkgRecent4w, ratio: jkgRatio, cnt: jkgPairs.length };

  // ── 요일별 (주말 제외) ──
  const dowSum = Array(7).fill(0), dowCnt = Array(7).fill(0);
  workPairs.forEach(([k,d]) => {
    const dow = new Date(k).getDay();
    dowSum[dow] += getQty(d); dowCnt[dow]++;
  });
  const dowAvg = dowSum.map((s,i) => dowCnt[i] ? Math.round(s/dowCnt[i]) : 0);
  const dowFactor = dowAvg.map(a => overall > 0 ? a/overall : 1);

  // ── 일별(1~31) (주말 제외) ──
  const domSum = Array(32).fill(0), domCnt = Array(32).fill(0);
  workPairs.forEach(([k,d]) => {
    const dom = parseInt(k.split('-')[2]);
    domSum[dom] += getQty(d); domCnt[dom]++;
  });
  const domAvg = domSum.map((s,i) => domCnt[i] ? Math.round(s/domCnt[i]) : 0);
  const domFactor = domAvg.map(a => overall > 0 ? a/overall : 1);

  // ── 월별(1~12) ──
  const monSum = Array(13).fill(0), monCnt = Array(13).fill(0);
  workPairs.forEach(([k,d]) => {
    const mon = parseInt(k.split('-')[1]);
    monSum[mon] += getQty(d); monCnt[mon]++;
  });
  const monAvg = monSum.map((s,i) => monCnt[i] ? Math.round(s/monCnt[i]) : 0);

  // ── 월초(첫 3 작업일) vs 일반 비교 ──
  // 월별로 그룹화 → 첫 3 작업일 추출 (캘린더 날짜 고정 아님, 공휴일/휴무 이후 실제 작업일 기준)
  const _monthMap = new Map();
  workPairs.forEach(([k]) => {
    const ym = k.slice(0, 7);
    if (!_monthMap.has(ym)) _monthMap.set(ym, []);
    _monthMap.get(ym).push(k);
  });
  const _earlyKeys = new Set();
  _monthMap.forEach(keys => keys.sort().slice(0, 3).forEach(k => _earlyKeys.add(k)));
  const earlyQtys = workPairs.filter(([k]) => _earlyKeys.has(k)).map(([,d]) => getQty(d));
  const lateQtys  = workPairs.filter(([k]) => !_earlyKeys.has(k)).map(([,d]) => getQty(d));
  const earlyAvg = earlyQtys.length ? Math.round(earlyQtys.reduce((a,b)=>a+b,0)/earlyQtys.length) : 0;
  const lateAvg  = lateQtys.length  ? Math.round(lateQtys.reduce((a,b)=>a+b,0)/lateQtys.length)  : 0;
  const earlyMonthFactor = overall > 0 && earlyAvg > 0 ? parseFloat((earlyAvg / overall).toFixed(3)) : 1;

  // ── ② 최근 4주 같은 요일 (단순 + 가중 4:3:2:1) ──
  const recent4wAvg = Array(7).fill(0), recent4wCnt = Array(7).fill(0);
  const weighted4wAvg = Array(7).fill(0);
  for (let _dow=1; _dow<=5; _dow++) {
    const _sd = workPairs.filter(([k])=>new Date(k).getDay()===_dow);
    const _last4 = _sd.slice(-4);
    if (_last4.length > 0) {
      recent4wAvg[_dow] = Math.round(_last4.reduce((s,[,d])=>s+getQty(d),0)/_last4.length);
      recent4wCnt[_dow] = _last4.length;
      const _ws=[4,3,2,1].slice(4-_last4.length);
      const _tw=_ws.reduce((a,b)=>a+b,0);
      weighted4wAvg[_dow] = Math.round(_last4.reduce((s,[,d],i)=>s+getQty(d)*_ws[i],0)/_tw);
    }
  }

  // ── ③ 단기 트렌드 계수 (최근 2주 vs 이전 2주 같은 요일) ──
  const trendFactor = Array(7).fill(1);
  for (let _dow=1; _dow<=5; _dow++) {
    const _sd = workPairs.filter(([k])=>new Date(k).getDay()===_dow);
    if (_sd.length >= 4) {
      const _l2 = _sd.slice(-2).reduce((s,[,d])=>s+getQty(d),0)/2;
      const _p2 = _sd.slice(-4,-2).reduce((s,[,d])=>s+getQty(d),0)/2;
      if (_p2 > 0) trendFactor[_dow] = parseFloat(Math.min(1.35,Math.max(0.65,_l2/_p2)).toFixed(3));
    }
  }

  // ── ④ 주차별 계수 (1주차:1-7일 / 2주차:8-14 / 3주차:15-21 / 4주차:22+) ──
  const _womSum=Array(4).fill(0),_womCnt=Array(4).fill(0);
  workPairs.forEach(([k,d])=>{
    const _dom=parseInt(k.split('-')[2]);
    const _wi=_dom<=7?0:_dom<=14?1:_dom<=21?2:3;
    _womSum[_wi]+=getQty(d); _womCnt[_wi]++;
  });
  const _womAvg=_womSum.map((s,i)=>_womCnt[i]?s/_womCnt[i]:0);
  const _womBase=_womAvg.filter(v=>v>0);
  const _womOverall=_womBase.length?_womBase.reduce((a,b)=>a+b,0)/_womBase.length:overallClean;
  const weekOfMonthFactor=_womAvg.map(v=>(_womOverall>0&&v>0)?parseFloat((v/_womOverall).toFixed(3)):1);
  const womCnt=_womCnt;

  // ── ⑤ 월말 계수 (25일+) ──
  const _lateQ=workPairs.filter(([k])=>parseInt(k.split('-')[2])>=25).map(([,d])=>getQty(d));
  const _lateAvg=_lateQ.length>=3?_lateQ.reduce((a,b)=>a+b,0)/_lateQ.length:overallClean;
  const lateMonthFactor=overallClean>0?parseFloat((_lateAvg/overallClean).toFixed(3)):1;

  // ── ⑥ 예측 정확도 보정 (back-test: 최근 8회 같은 요일) ──
  const accuracyFactor=Array(7).fill(1);
  for (let _dow=1; _dow<=5; _dow++) {
    const _sd=workPairs.filter(([k])=>new Date(k).getDay()===_dow);
    if (_sd.length<5) continue;
    const _test=_sd.slice(-8);
    const _ratios=[];
    _test.forEach(([,d],_idx)=>{
      const _before=_sd.slice(0,_sd.length-_test.length+_idx);
      const _b4=_before.slice(-4);
      if(_b4.length<2) return;
      const _ws=[4,3,2,1].slice(4-_b4.length),_tw=_ws.reduce((a,b)=>a+b,0);
      const _sim=_b4.reduce((s,[,d2],i)=>s+getQty(d2)*_ws[i],0)/_tw;
      const _act=getQty(d);
      if(_sim>0&&_act>0) _ratios.push(_act/_sim);
    });
    if(_ratios.length>=2){
      const _raw=_ratios.reduce((a,b)=>a+b,0)/_ratios.length;
      accuracyFactor[_dow]=parseFloat(Math.min(1.25,Math.max(0.75,0.4+_raw*0.6)).toFixed(3));
    }
  }

  // ── ⑦ 주문량-작업량 비율 학습 ──
  const orderPairs = workPairs.filter(([,d]) => d.orderTotal > 0 && getQty(d) > 0);
  let orderRatio = 0;
  if (orderPairs.length >= 5) {
    const ratios = orderPairs.map(([,d]) => getQty(d) / d.orderTotal);
    orderRatio = parseFloat((ratios.reduce((a,b)=>a+b,0) / ratios.length).toFixed(3));
  }

  // ── ⑧ A0 지시수량 → 박스 비율 학습 ──
  const A0_BRANDS_RPT = ['동구바이오','삼천당제약','국제약품','대우제약','아주약품','비씨월드','종근당','기타'];
  const instrBrandSum = {}, instrBrandCnt = {};
  A0_BRANDS_RPT.forEach(b => { instrBrandSum[b]={instr:0,boxes:0,count:0}; instrBrandCnt[b]=0; });
  let instrDayCount=0, instrTotalRatioSum=0, instrDayRatioCnt=0;
  workPairs.forEach(([,d]) => {
    if (!d.instrData) return;
    instrDayCount++;
    A0_BRANDS_RPT.forEach(brand => {
      const bd = d.instrData[brand];
      if (bd && bd.instr > 0 && bd.boxes > 0) {
        instrBrandSum[brand].instr += bd.instr;
        instrBrandSum[brand].boxes += bd.boxes;
        if (brand === '종근당' && bd.count > 0) instrBrandSum[brand].count += bd.count;
        instrBrandCnt[brand]++;
      }
    });
    if (d.instrTotal > 0 && getQty(d) > 0) {
      instrTotalRatioSum += d.instrTotal / getQty(d);
      instrDayRatioCnt++;
    }
  });
  const instrRatios = {};
  A0_BRANDS_RPT.forEach(brand => {
    if (instrBrandCnt[brand] >= 1 && instrBrandSum[brand].boxes > 0) {
      instrRatios[brand] = {
        ratio: parseFloat((instrBrandSum[brand].instr / instrBrandSum[brand].boxes).toFixed(2)),
        days: instrBrandCnt[brand],
        totalInstr: instrBrandSum[brand].instr,
        totalBoxes: instrBrandSum[brand].boxes,
        ...(brand==='종근당' && instrBrandSum[brand].count>0 ? {
          totalCount: instrBrandSum[brand].count,
          countToBoxRatio: parseFloat((instrBrandSum[brand].boxes / instrBrandSum[brand].count).toFixed(3))
        } : {})
      };
    }
  });
  const instrOverallRatio = instrDayRatioCnt > 0
    ? parseFloat((instrTotalRatioSum / instrDayRatioCnt).toFixed(3)) : 0;

  // ── ⑨ 향후 7일 예측 — 모든 계수 통합 블렌드 ──
  const forecast = [];
  for (let i=1; i<=10; i++) {
    const fd = new Date(); fd.setDate(fd.getDate()+i);
    const _fdow = fd.getDay();
    if (_fdow===0||_fdow===6) continue;
    if (forecast.length>=7) break;
    const fKey = `${fd.getFullYear()}-${pad(fd.getMonth()+1)}-${pad(fd.getDate())}`;
    if (isHoliday(fKey)) continue;
    const _fdom = fd.getDate(), _fmon = fd.getMonth()+1;
    // 월 계수 (30% 반영)
    const _monF = monCnt[_fmon]>=2&&monAvg[_fmon]>0 ? 1+(monAvg[_fmon]/overallClean-1)*0.3 : 1;
    // 날짜 계수 — domFactor vs weekOfMonth 중 데이터 많은 쪽 (50% 반영)
    const _rawDomF = domFactor[_fdom]||1;
    const _wi = _fdom<=7?0:_fdom<=14?1:_fdom<=21?2:3;
    const _rawWomF = weekOfMonthFactor[_wi]||1;
    const _dateF = domCnt[_fdom]>=3 ? 1+(_rawDomF-1)*0.5 : 1+(_rawWomF-1)*0.5;
    // 월말 계수 (60% 반영)
    const _latef = _fdom>=25 ? 1+(lateMonthFactor-1)*0.6 : 1;
    // 베이스 블렌딩
    const _w4w = weighted4wAvg[_fdow];
    const _cnt = recent4wCnt[_fdow]||0;
    const _trend = trendFactor[_fdow]||1;
    const _pBase = Math.round(overallClean * (dowFactor[_fdow]||1));
    let _base;
    if (_w4w>0&&_cnt>=3)      { _base = _w4w*_trend*0.60 + _pBase*0.40; }
    else if (_w4w>0&&_cnt>=2) { _base = _w4w*_trend*0.40 + _pBase*0.60; }
    else if (_w4w>0)           { _base = _w4w*0.25 + _pBase*0.75; }
    else                       { _base = _pBase; }
    // 월초 첫 3 작업일 계수 (50% 반영)
    let _fNthWD = 0;
    for (let _dy = 1; _dy <= 31; _dy++) {
      const _dd = new Date(fd.getFullYear(), fd.getMonth(), _dy);
      if (_dd.getMonth() !== fd.getMonth()) break;
      const _kk = `${fd.getFullYear()}-${pad(fd.getMonth()+1)}-${pad(_dy)}`;
      if (_dd.getDay() !== 0 && _dd.getDay() !== 6 && !isHoliday(_kk)) {
        _fNthWD++;
        if (_kk === fKey) break;
      }
    }
    const _earlyF = _fNthWD <= 3 && earlyMonthFactor > 1.05 ? 1 + (earlyMonthFactor - 1) * 0.5 : 1;
    // 공휴일/휴무 직다음날 여부
    const _prevWd = _prevWorkday(fKey);
    const _isNextDay = !!(_prevWd && _isClosedDay(_prevWd));
    const _ndF = _isNextDay ? nextDayFactor : 1;
    // 공휴일/휴무 직전날 여부
    const _nextWd = _nextWorkday(fKey);
    const _isPrevDay = !!(_nextWd && _isClosedDay(_nextWd));
    const _pdF = _isPrevDay ? prevDayFactor : 1;
    // 정확도 보정 + 날짜/월/월초/공휴일다음날/공휴일전날 계수
    let _pred = Math.round(_base * _dateF * _monF * _latef * _earlyF * (accuracyFactor[_fdow]||1) * _ndF * _pdF);
    // 클램핑 (공휴일 다음날은 상한 더 넓게, 공휴일 전날은 하한 더 낮게)
    _pred = Math.max(Math.round(overallClean*(_isPrevDay?0.25:0.35)), Math.min(Math.round(overallClean*(_isNextDay?2.6:2.1)), _pred));
    const _conf = _cnt>=4?'high':_cnt>=3?'med':'low';
    forecast.push({ key:fKey, dow:_fdow, dom:_fdom, mon:_fmon, predicted:_pred, confidence:_conf, isNextDay:_isNextDay, isPrevDay:_isPrevDay });
  }

  // ── 베스트/워스트 요일 (주말 제외) ──
  const validDow = dowAvg.map((a,i)=>({i,a,kr:DOW_KR[i],cnt:dowCnt[i]}))
    .filter(x => x.cnt >= 4 && x.i !== 0 && x.i !== 6); // 주말 제외, 최소 4일 이상 데이터
  validDow.sort((a,b)=>b.a-a.a);

  // ── 작업자 설정 (경력기준 등급 포함) ──
  const _wcfg = JSON.parse(localStorage.getItem('sys_config_v1') || '{}');
  const _wMeta = {};
  (_wcfg.workers || []).forEach(w => {
    if (!w || !w.name) return;
    const obj = typeof w === 'string' ? {name:w, grade:'B'} : w;
    const days = obj.startDate ? Math.floor((Date.now() - new Date(obj.startDate).getTime()) / 86400000) : null;
    let expGrade = null;
    if (days !== null) {
      expGrade = days >= 181 ? 'A' : days >= 121 ? 'B' : days >= 61 ? 'C' : 'D';
    }
    _wMeta[obj.name] = { grade: obj.grade || 'B', startDate: obj.startDate || null, days, expGrade };
  });

  // ── 위고비 계절성 분석 ──
  const _pMeta = _wcfg.productMeta || JSON.parse('{}');
  const _peakMonths = new Set(_pMeta.peakMonths || [3,4,5,6,7,8]);
  const _lowMonths  = new Set(_pMeta.lowMonths  || [12,1,2]);
  const peakQtys = workPairs.filter(([k]) => _peakMonths.has(parseInt(k.slice(5,7)))).map(([,d]) => getQty(d));
  const lowQtys  = workPairs.filter(([k]) => _lowMonths.has(parseInt(k.slice(5,7)))).map(([,d]) => getQty(d));
  const peakAvg  = peakQtys.length >= 3 ? Math.round(peakQtys.reduce((a,b)=>a+b,0)/peakQtys.length) : 0;
  const lowAvg   = lowQtys.length  >= 3 ? Math.round(lowQtys.reduce((a,b)=>a+b,0)/lowQtys.length)  : 0;
  const seasonalFactor = (peakAvg > 0 && lowAvg > 0) ? parseFloat((peakAvg / lowAvg).toFixed(2)) : 0;
  const seasonalAnalysis = { peakAvg, lowAvg, peakCnt: peakQtys.length, lowCnt: lowQtys.length, seasonalFactor, productName: _pMeta.name || '' };

  // ── 작업자별 기여도 분석 (workerSnapshot 있는 이력만) ──
  const workerPairs = workPairs.filter(([,d]) => d.workerSnapshot && d.workerSnapshot.members);
  const workerAnalysis = {};
  if (workerPairs.length >= 3) {
    // 팀계수로 나눈 "표준화 물량" 기준으로 각 작업자 기여도 추정
    const allNames = new Set();
    workerPairs.forEach(([,d]) => Object.keys(d.workerSnapshot.members).forEach(n => allNames.add(n)));
    allNames.forEach(name => {
      const presentDays = workerPairs.filter(([,d]) => {
        const s = d.workerSnapshot.members[name]?.status;
        return s === 'present' || s === 'late';
      });
      const absentDays = workerPairs.filter(([,d]) => {
        const s = d.workerSnapshot.members[name]?.status;
        return !s || s === 'absent';
      });
      if (presentDays.length < 2) return;
      // 팀계수 보정 물량: qty / (teamFactor/100)
      const normQty = days => days.map(([,d]) => {
        const tf = d.workerSnapshot.teamFactor || 100;
        return getQty(d) / (tf / 100);
      });
      const pNorm = normQty(presentDays);
      const aNorm = normQty(absentDays);
      const pAvg = Math.round(pNorm.reduce((a,b)=>a+b,0) / pNorm.length);
      const aAvg = aNorm.length >= 2 ? Math.round(aNorm.reduce((a,b)=>a+b,0) / aNorm.length) : 0;
      // 등급 이력 (가장 최근 기록 기준)
      const lastRecord = [...presentDays].reverse()[0];
      const grade = lastRecord[1].workerSnapshot.members[name]?.grade || 'B';
      // 최근 추세 (최근 5회 vs 이전 5회 출근 비교)
      let trend = 0;
      if (presentDays.length >= 6) {
        const half = Math.floor(presentDays.length / 2);
        const recentN = normQty(presentDays.slice(-half));
        const olderN  = normQty(presentDays.slice(0, half));
        const rA = recentN.reduce((a,b)=>a+b,0)/recentN.length;
        const oA = olderN.reduce((a,b)=>a+b,0)/olderN.length;
        trend = oA > 0 ? Math.round((rA - oA) / oA * 100) : 0;
      }
      const meta = _wMeta[name] || {};
      workerAnalysis[name] = {
        grade, presentCount: presentDays.length, absentCount: absentDays.length,
        pAvg, aAvg, trend,
        liftPct: aAvg > 0 ? Math.round((pAvg - aAvg) / aAvg * 100) : 0,
        startDate: meta.startDate || null,
        days: meta.days || null,
        expGrade: meta.expGrade || null
      };
    });
  }
  // 성과 데이터 없는 작업자도 경력기준 정보 표시
  Object.entries(_wMeta).forEach(([name, meta]) => {
    if (!workerAnalysis[name]) {
      workerAnalysis[name] = {
        grade: meta.grade, presentCount: 0, absentCount: 0,
        pAvg: 0, aAvg: 0, trend: 0, liftPct: 0,
        startDate: meta.startDate, days: meta.days, expGrade: meta.expGrade
      };
    }
  });

  // ── 예측 정확도 분석 (최근 10일 백테스트) ──
  // 각 날짜의 "그 날 이전 데이터"만으로 예측 시뮬레이션 → 실제와 비교
  const predAccuracyLog = [];
  workPairs.slice(-10).forEach(([k, d]) => {
    const dw = new Date(k).getDay();
    const actual = getQty(d);
    const prevAll = workPairs.filter(([pk]) => pk < k);
    const prevSameDay = prevAll.filter(([pk]) => new Date(pk).getDay() === dw);
    let pred = 0;
    if (prevSameDay.length >= 1) {
      const last4 = prevSameDay.slice(-4);
      const ws = [4,3,2,1].slice(4-last4.length), tw = ws.reduce((a,b)=>a+b,0);
      pred = Math.round(last4.reduce((s,[,d2],i)=>s+getQty(d2)*ws[i],0)/tw);
    } else if (prevAll.length >= 1) {
      pred = Math.round(prevAll.reduce((s,[,d2])=>s+getQty(d2),0)/prevAll.length);
    }
    if (pred <= 0 || actual <= 0) return;
    const err = Math.round((actual - pred) / pred * 100);
    const reason = Math.abs(err)<10?'정상':err>=30?'급증':err>=10?'예상초과':err<=-30?'급감':'예상미달';
    predAccuracyLog.push({ key:k, dw, actual, pred, err, reason });
  });
  const _absErrs = predAccuracyLog.map(x=>Math.abs(x.err));
  const predAvgErr = _absErrs.length > 0 ? Math.round(_absErrs.reduce((a,b)=>a+b,0)/_absErrs.length) : 0;
  const predAccuracy = { log: predAccuracyLog, avgErr: predAvgErr, confidence: Math.max(0, 100-predAvgErr) };

  // ── 처리기준 인원 계산 (09:00~18:00, 유효 8시간) ──
  let _avgPresent;
  if (workerPairs.length >= 3) {
    _avgPresent = parseFloat((workerPairs.reduce((s,[,d]) => s + (d.workerSnapshot?.presentCount || 0), 0) / workerPairs.length).toFixed(1));
  } else {
    _avgPresent = (_wcfg.workers || []).length || 7;
  }
  const _ratePerPH = _avgPresent > 0 ? parseFloat((overallClean / (_avgPresent * 8)).toFixed(2)) : 0;
  const capacityAnalysis = { avgPresent: _avgPresent, ratePerPH: _ratePerPH };

  // ── 최근 30일 트렌드 (평일만) ──
  const recent30 = workPairs.slice(-30);
  const r30first = recent30.slice(0,15).map(([,d])=>getQty(d));
  const r30last  = recent30.slice(15).map(([,d])=>getQty(d));
  const r30firstAvg = r30first.length ? Math.round(r30first.reduce((a,b)=>a+b,0)/r30first.length) : 0;
  const r30lastAvg  = r30last.length  ? Math.round(r30last.reduce((a,b)=>a+b,0)/r30last.length)  : 0;
  const trendPct = r30firstAvg > 0 ? Math.round((r30lastAvg - r30firstAvg) / r30firstAvg * 100) : 0;

  const result = {
    overall: Math.round(overall),
    totalDays: workPairs.length,
    totalDaysAll: pairs.length,
    holidayExcluded,
    offDayExcluded,
    holidayPattern,
    earlyMonthFactor,
    recent4wAvg, recent4wCnt, orderRatio,
    totalQtySum: qtys.reduce((a,b)=>a+b,0),
    maxQty: Math.max(...qtys), maxDay: workPairs[qtys.indexOf(Math.max(...qtys))][0],
    minQty: Math.min(...qtys.filter(q=>q>0)),
    dowAvg, dowFactor, dowCnt, validDow,
    domAvg, domFactor, domCnt,
    monAvg, monCnt,
    earlyAvg, lateAvg, earlyPct: overall>0?Math.round(earlyAvg/overall*100):100,
    forecast,
    trendPct, r30firstAvg, r30lastAvg,
    instrRatios, instrOverallRatio, instrDayCount,
    overallClean, weighted4wAvg,
    trendFactor, weekOfMonthFactor, womCnt,
    lateMonthFactor, accuracyFactor,
    nextDayFactor, nextDayCount,
    prevDayFactor, prevDayCount,
    workerAnalysis, workerDataDays: workerPairs.length,
    seasonalAnalysis, wMeta: _wMeta,
    jkgAnalysis, capacityAnalysis, predAccuracy
  };

  // ✅ 예측 데이터를 config.json에 저장 → work.html에서 사용
  savePredictionToConfig(result);

  return result;
}

async function savePredictionToConfig(a) {
  if (_TM) return; // 🧪 테스트 모드: Firebase 차단
  try {
    const r = await fetch(`${API}/config.json?t=${Date.now()}`);
    const cfg = (await r.json().catch(()=>({}))) || {};
    cfg.prediction = {
      overall: a.overallClean || a.overall,
      overallRaw: a.overall,
      dowAvg: a.dowAvg,
      dowFactor: a.dowFactor,
      domFactor: a.domFactor,
      domCnt: a.domCnt,
      monAvg: a.monAvg,
      monCnt: a.monCnt,
      recent4wAvg: a.recent4wAvg,
      recent4wCnt: a.recent4wCnt,
      weighted4wAvg: a.weighted4wAvg,
      trendFactor: a.trendFactor,
      weekOfMonthFactor: a.weekOfMonthFactor,
      lateMonthFactor: a.lateMonthFactor,
      accuracyFactor: a.accuracyFactor,
      nextDayFactor: a.nextDayFactor || 1.2,
      prevDayFactor: a.prevDayFactor || 0.8,
      orderRatio: a.orderRatio,
      forecast: (a.forecast || []).slice(0, 7).map(f => ({ key: f.key, predicted: f.predicted, confidence: f.confidence })),
      avgPresent: a.capacityAnalysis?.avgPresent || 0,
      updatedAt: new Date().toISOString().slice(0,10),
      baseDays: a.totalDays
      // autoCalc 없음 → 리포트 분석 결과임을 표시
    };
    // 종근당 매핑 전용 예측 데이터 저장
    if (a.jkgAnalysis && a.jkgAnalysis.cnt >= 3) {
      cfg.jkgPrediction = {
        overall: a.jkgAnalysis.overall,
        dowAvg: a.jkgAnalysis.dowAvg,
        dowFactor: a.jkgAnalysis.dowFactor,
        recent4w: a.jkgAnalysis.recent4w,
        ratio: a.jkgAnalysis.ratio,
        cnt: a.jkgAnalysis.cnt,
        updatedAt: new Date().toISOString().slice(0,10)
      };
    }
    // A0 지시수량 비율 별도 저장 (A0지시 탭과 공유)
    if (Object.keys(a.instrRatios).length > 0) {
      cfg.instrRatios = {};
      Object.entries(a.instrRatios).forEach(([brand, v]) => {
        cfg.instrRatios[brand] = { ratio: v.ratio, days: v.days };
      });
      cfg.instrOverallRatio = a.instrOverallRatio;
      cfg.instrDayCount = a.instrDayCount;
      cfg.instrUpdatedAt = new Date().toISOString().slice(0,10);
    }
    await fetch(`${API}/config.json`, {
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(cfg)
    });
    // 분석 완료 자동 공지
    await postAnalysisNotice(a);
  } catch(e) {}
}

async function postAnalysisNotice(a) {
  try {
    const API2 = typeof API !== 'undefined' ? API : '';
    if (!API2) return;
    const r = await fetch(`${API2}/notice.json?t=${Date.now()}`);
    const d = (r.ok ? await r.json().catch(()=>null) : null) || {};
    const notices = d.notices || [];
    // 오늘 이미 분석 공지가 있으면 업데이트, 없으면 추가
    const today = new Date().toISOString().slice(0,10);
    const idx = notices.findIndex(n => n.type==='analysis' && n.date===today);
    const newNotice = {
      id: idx >= 0 ? notices[idx].id : Date.now().toString(),
      type: 'analysis',
      title: `📊 예측 데이터 업데이트 (${today})`,
      content: `리포트 분석이 완료되어 예측 데이터가 갱신되었습니다.\n\n` +
        `• 평일 평균: ${a.overall}박스\n` +
        `• 분석 기준일수: ${a.totalDays}일\n` +
        `• 최근 트렌드: ${a.trendPct >= 0 ? '+' : ''}${a.trendPct}%\n` +
        `• 내일 예상: ${a.forecast && a.forecast.length > 0 ? a.forecast[0].predicted + '박스' : '계산중'}`,
      date: today,
      important: false,
      auto: true
    };
    if (idx >= 0) notices[idx] = newNotice;
    else notices.push(newNotice);
    if (notices.length > 50) notices.splice(0, notices.length - 50);
    await fetch(`${API2}/notice.json`, {
      method: 'PUT',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ notices })
    });
  } catch(e) {}
}

function renderAnalysis(a) {
  const DOW_KR = ['일','월','화','수','목','금','토'];
  const DOW_COLOR = ['#ff6b9d','#3b9eff','#2ecc71','#a78bfa','#ffd600','#f97316','#06b6d4'];
  const MON_NAMES = ['','1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

  // ── 섹션 렌더 헬퍼 ──
  function barChart(items, colorFn, maxV) {
    const m = maxV || Math.max(...items.map(x=>x.val), 1);
    return `<div class="chart-wrap">${items.map(x=>`
      <div class="chart-row">
        <div class="chart-label" style="color:${colorFn(x)};font-weight:${x.bold?'900':'700'}">${x.label}</div>
        <div class="chart-bar-bg">
          <div class="chart-bar" style="width:${(x.val/m*100).toFixed(1)}%;background:${colorFn(x)};${x.bold?'box-shadow:0 0 6px '+colorFn(x):''}"></div>
        </div>
